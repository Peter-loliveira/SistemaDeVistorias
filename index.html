<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câmera Vue.js com PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }
        #app {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        video {
            width: 100%;
            max-width: 400px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-top: 15px;
            background-color: black;
        }
        canvas {
            display: none;
        }
        .photos-container {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            width: 100%;
        }
        .photos-container h2 {
            color: #555;
            margin-bottom: 15px;
        }
        .photo-item {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .photo-item img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Capturar Fotos com Vue.js</h1>

        <button @click="startCamera" v-if="!cameraActive && photos.length === 0">
            Ativar Câmera
        </button>
        <button @click="takePhoto" v-if="cameraActive">
            Tirar Foto
        </button>

        <video ref="video" autoplay v-show="cameraActive"></video>
        <canvas ref="canvas" style="display:none;"></canvas>

        <p class="error" v-if="error">{{ error }}</p>

        <div class="photos-container" v-if="photos.length > 0">
            <h2>Suas Fotos</h2>
            <div v-for="(photo, index) in photos" :key="index" class="photo-item">
                <img :src="photo" :alt="'Foto ' + (index + 1)">
            </div>
        </div>

        <button @click="gerarPdf" v-if="photos.length > 0">
            GERAR PDF
        </button>

    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                cameraActive: false,
                stream: null,
                photos: [],
                error: null
            },
            methods: {
                async startCamera() {
                    this.error = null;
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        const video = this.$refs.video;
                        video.srcObject = this.stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            this.cameraActive = true;
                        };
                    } catch (err) {
                        console.error("Erro ao acessar a câmera: ", err);
                        this.error = "Não foi possível acessar a câmera. Verifique as permissões.";
                        this.cameraActive = false;
                    }
                },
                takePhoto() {
                    if (!this.stream) {
                        this.error = "Câmera não está ativa.";
                        return;
                    }

                    const video = this.$refs.video;
                    const canvas = this.$refs.canvas;
                    const context = canvas.getContext('2d');

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const photoDataUrl = canvas.toDataURL('image/png');

                    // Adiciona a nova foto ao início do array para que ela apareça abaixo das anteriores
                    this.photos.unshift(photoDataUrl);
                },
                stopCamera() {
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                        this.stream = null;
                        this.cameraActive = false;
                    }
                },
                async gerarPdf() {
                    if (this.photos.length === 0) {
                        alert("Não há fotos para gerar o PDF!");
                        return;
                    }

                    // Acessa a classe jsPDF do objeto global window
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF(); // Cria um novo documento PDF

                    const margin = 10; // Margem em mm
                    let yPos = margin; // Posição Y inicial para a imagem
                    const pageWidth = doc.internal.pageSize.getWidth();
                    const pageHeight = doc.internal.pageSize.getHeight();

                    // Itera sobre as fotos no array
                    for (let i = 0; i < this.photos.length; i++) {
                        const photo = this.photos[i];

                        // Cria uma imagem temporária para obter suas dimensões
                        const img = new Image();
                        img.src = photo;

                        await new Promise(resolve => {
                            img.onload = () => {
                                const imgWidth = img.width;
                                const imgHeight = img.height;

                                // Calcula a proporção para ajustar a imagem à largura da página
                                const ratio = (pageWidth - 2 * margin) / imgWidth;
                                const newImgWidth = pageWidth - 2 * margin;
                                const newImgHeight = imgHeight * ratio;

                                // Se a imagem não couber na página atual, adiciona uma nova página
                                if (yPos + newImgHeight > pageHeight - margin && i > 0) {
                                    doc.addPage();
                                    yPos = margin; // Reinicia a posição Y na nova página
                                }

                                // Adiciona a imagem ao PDF
                                // Parâmetros: imagem (Data URL), formato, x, y, largura, altura
                                doc.addImage(photo, 'PNG', margin, yPos, newImgWidth, newImgHeight);

                                // Atualiza a posição Y para a próxima imagem (com um pequeno espaçamento)
                                yPos += newImgHeight + margin;
                                resolve();
                            };
                            img.onerror = (err) => {
                                console.error("Erro ao carregar imagem para PDF:", err);
                                resolve(); // Resolve mesmo com erro para não travar o loop
                            };
                        });
                    }

                    // Salva o documento PDF com um nome de arquivo
                    doc.save("minhas_fotos.pdf");
                    alert("PDF gerado com sucesso!");
                }
            },
            beforeDestroy() {
                this.stopCamera();
            }
        });
    </script>
</body>
</html>
