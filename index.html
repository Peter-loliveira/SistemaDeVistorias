<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo de Vistoria</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Variáveis de Cor RE/MAX */
        :root {
            --remax-blue: #003da5;
            --remax-red: #e60e16;
            --remax-light-gray: #cccccc;
            --remax-medium-gray: #bbbbbb;
            --remax-dark-gray: #aaaaaa;
        }

        /* Estilos Gerais */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--remax-light-gray);
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-grow: 1;
        }

        /* Container do logo do cabeçalho */
        .header-logo-container {
            width: 100%;
            max-width: 100%;
            background-color: #f9f9f9;
            border-bottom: 3px solid var(--remax-blue);
            border-radius: 5px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-logo {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            margin: 0 auto;
        }

        /* Título do formulário */
        h1 {
            color: var(--remax-blue);
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            border-bottom: 3px solid var(--remax-blue);
            background-color: #f9f9f9;
            border-radius: 8px;
            font-size: 1.8rem;
        }

        h2 {
            color: var(--remax-blue);
            margin-top: 35px;
            border-bottom: 1px solid var(--remax-medium-gray);
            padding-bottom: 10px;
            text-align: center;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input,
        input::placeholder,
        textarea,
        textarea::placeholder,
        select {
            font-size: 1rem;
            color: #333;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input {
            -moz-appearance: textfield;
        }

        input::-ms-clear {
            display: none;
        }

        input::-ms-reveal {
            display: none;
        }

        input,
        input::-webkit-input-placeholder,
        textarea,
        textarea::-webkit-input-placeholder,
        select {
            opacity: 1;
            /* Prevents iOS placeholder color bug */
        }

        input::-moz-placeholder,
        textarea::-moz-placeholder,
        select::-moz-placeholder {
            color: #777;
            opacity: 1;
        }

        input:-ms-input-placeholder,
        textarea:-ms-input-placeholder,
        select:-ms-input-placeholder {
            color: #777;
            opacity: 1;
        }

        input::placeholder,
        textarea::placeholder,
        select::placeholder {
            color: #777;
            opacity: 1;
        }

        input:focus::-webkit-input-placeholder {
            color: transparent;
        }

        textarea:focus::-webkit-input-placeholder {
            color: transparent;
        }

        select:focus::-webkit-input-placeholder {
            color: transparent;
        }

        input:focus::-moz-placeholder {
            color: transparent;
        }

        textarea:focus::-moz-placeholder {
            color: transparent;
        }

        select:focus::-moz-placeholder {
            color: transparent;
        }

        input:focus:-ms-input-placeholder {
            color: transparent;
        }

        textarea:focus:-ms-input-placeholder,
        select:focus:-ms-input-placeholder {
            color: transparent;
        }

        input:focus::placeholder {
            color: transparent;
        }

        textarea:focus::placeholder {
            color: transparent;
        }

        select:focus::placeholder {
            color: transparent;
        }

        input,
        input::-webkit-input-placeholder,
        textarea,
        textarea::-webkit-input-placeholder,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--remax-medium-gray);
            border-radius: 5px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: 'Roboto', sans-serif;
            /* Garante consistência da fonte */
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--remax-blue);
            box-shadow: 0 0 5px rgba(0, 61, 165, 0.5);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Layout Específico: Estado do Imóvel */
        .form-group.estado-imovel {
            flex-direction: row;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            /* Permite quebrar linha em telas menores */
        }

        .form-group.estado-imovel label {
            margin-bottom: 0;
            flex-shrink: 0;
            /* Impede que o label encolha */
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 0;
            /* Conforme requisito */
            justify-content: center;
            /* Centraliza as opções de rádio */
            width: 100%;
            /* Garante que o radio-group ocupe toda a largura disponível */
        }

        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
            color: #555;
            /* Cor padrão não selecionado */
            transition: color 0.3s ease;
            font-size: 1rem;
            /* Garante consistência da fonte */
        }

        .radio-group input {
            margin-right: 8px;
            width: auto;
        }

        .radio-group input:checked+span {
            color: var(--remax-blue);
            font-weight: bold;
        }

        /* Botões */
        .button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.3s ease;
            height: 40px;
            min-height: 40px;
            font-weight: bold;
            white-space: nowrap;
            /* Previne quebra de linha em botões com ícone e texto */
        }

        .button.icon-only {
            /* Novo estilo para botões apenas com ícone */
            padding: 0;
            width: 40px;
            height: 40px;
            gap: 0;
        }

        .button .material-icons {
            font-size: 1.5rem;
        }

        .primary-button {
            background-color: var(--remax-blue);
            color: #fff;
        }

        .primary-button:hover {
            background-color: #3366bb;
        }

        .delete-button {
            background-color: var(--remax-red);
            color: #fff;
        }

        .delete-button:hover {
            background-color: #ff4d4d;
        }

        .pdf-button {
            background-color: var(--remax-red);
            color: #fff;
            /* margin-top: 30px; */
            width: 100%;
        }

        .pdf-button:hover {
            background-color: #ff4d4d;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .input-with-buttons .action-buttons .button {
            flex-grow: 0;
            max-width: none;
        }

        .action-buttons .button {
            flex-grow: 1;
            max-width: 200px;
        }

        /* Tabelas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        th,
        td {
            border: 1px solid var(--remax-medium-gray);
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: #f0f0f0;
            font-weight: bold;
            color: #444;
        }

        td img {
            max-width: 100px;
            max-height: 100px;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .no-records {
            text-align: center;
            color: #777;
            padding: 20px;
            font-style: italic;
        }

        /* Modal da Câmera */
        .camera-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .camera-modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .camera-modal-content video {
            width: 100%;
            max-height: 400px;
            background-color: #000;
            border-radius: 5px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .camera-modal-content canvas {
            display: none;
        }

        .camera-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .camera-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .camera-modal-close:hover,
        .camera-modal-close:focus {
            color: var(--remax-red);
        }

        .camera-error-message {
            color: var(--remax-red);
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* Novo estilo para blocos de informação */
        .info-block {
            border: 1px solid var(--remax-medium-gray);
            border-radius: 8px;
            padding: 0px 20px 20px 20px;
            margin-top: 20px;
            margin-bottom: 20px;
            background-color: #fcfcfc;
        }

        .info-block h3 {
            text-align: center;
            color: var(--remax-blue);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .info-block .form-group {
            margin-bottom: 15px;
        }

        .info-block .form-group:last-child {
            margin-bottom: 0;
        }

        /* Estilos para agrupar campos lado a lado */
        .form-group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 18px;
        }

        .form-group-row .form-group {
            flex: 1;
            min-width: 250px;
            margin-bottom: 0;
        }

        .form-group-row .form-group label {
            text-align: center;
            width: 100%;
        }

        /* Rodapé */
        /* REMOVIDO: O rodapé e seus textos foram removidos conforme solicitação */

        /* Novo estilo para agrupar input e botões */
        .input-with-buttons {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 18px;
        }

        .input-with-buttons .form-group {
            flex-grow: 1;
            margin-bottom: 0;
        }

        .input-with-buttons .action-buttons {
            display: flex;
            gap: 5px;
            margin-top: 0;
            justify-content: flex-start;
            align-items: flex-end;
            margin-bottom: 0;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 10px auto;
                padding: 20px;
            }

            /* .header-logo-container {
                margin: -20px -20px 20px -20px;
                border-radius: 8px 8px 0 0;
                
            } */

            h1 {
                font-size: 1.5rem;
                margin-left: -20px;
                margin-right: -20px;
                padding: 15px;
            }

            h2 {
                font-size: 1.4rem;
            }

            .form-group.estado-imovel,
            .form-group-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .form-group-row .form-group {
                min-width: 100%;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons .button {
                max-width: 100%;
            }

            .action-buttons .button.icon-only {
                max-width: 40px;
            }

            .input-with-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .input-with-buttons .action-buttons {
                justify-content: center;
                margin-top: 10px;
            }

            th,
            td {
                padding: 8px;
                font-size: 0.9rem;
            }

            td img {
                max-width: 80px;
                max-height: 80px;
            }

            .info-block {
                padding: 15px;
            }
        }

        /* REMOVIDO: .textFooter foi removido conforme solicitação */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            /* .header-logo-container {
                margin: -15px -15px 15px -15px;
            } */

            h1 {
                font-size: 1.3rem;
                margin-left: -15px;
                margin-right: -15px;
                padding: 12px;
            }

            h2 {
                font-size: 1.2rem;
            }

            .camera-modal-content {
                padding: 15px;
            }
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-top: 0;
            flex-wrap: wrap;
            padding: 10px 0;
        }

        .button-container .button {
            min-width: 200px;
            flex: 1 1 auto;
            max-width: 250px;
            vertical-align: middle;
            line-height: 1;
        }

        .save-photos-button {
            background-color: #f4b42d;
            color: #000;
        }

        .save-photos-button:hover {
            background-color: #f5c04d;
        }

        .ConditionButtons {
            display: flex;
            gap: 12px;
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .ConditionButtons button {
            /* Todas as dimensões iguais baseadas no maior texto */
            min-width: 100px;
            height: 40px;

            /* Fundo branco e bordas */
            background-color: #ffffff;
            border: 3px solid;
            border-radius: 12px;

            /* Texto em maiúsculas */
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;

            /* Cursor e transição suave */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            /* Sombra sutil */
            /* box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); */
        }

        /* Cores individuais para cada botão - degradê de qualidade */

        /* NOVO - Roxo/Neutro (novo item, ainda não avaliado) */
        .ConditionButtons button[data-condition="novo"] {
            border-color: #9b59b6;
            color: #9b59b6;
        }

        .ConditionButtons button[data-condition="novo"]:hover {
            background-color: #f3e5f5;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(155, 89, 182, 0.3);
        }

        .ConditionButtons button[data-condition="novo"].active {
            background-color: #9b59b6;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.5);
        }

        /* EXCELENTE - Verde (melhor qualidade) */
        .ConditionButtons button[data-condition="excelente"] {
            border-color: #6b67e1;
            color: #6b67e1;
        }

        .ConditionButtons button[data-condition="excelente"]:hover {
            background-color: #e8f5e9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3);
        }

        .ConditionButtons button[data-condition="excelente"].active {
            background-color: #6b67e1;
            color: #ffffff;
            box-shadow: 0 4px 15px #6b67e1;
        }

        /* BOM - Verde-amarelado (boa qualidade) */
        .ConditionButtons button[data-condition="bom"] {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .ConditionButtons button[data-condition="bom"]:hover {
            background-color: #e8f8f5;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
        }

        .ConditionButtons button[data-condition="bom"].active {
            background-color: #2ecc71;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.5);
        }

        /* REGULAR - Amarelo/Laranja (qualidade média) */
        .ConditionButtons button[data-condition="regular"] {
            border-color: #f39c12;
            color: #f39c12;
        }

        .ConditionButtons button[data-condition="regular"]:hover {
            background-color: #fef5e7;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(243, 156, 18, 0.3);
        }

        .ConditionButtons button[data-condition="regular"].active {
            background-color: #f39c12;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.5);
        }

        /* RUIM - Vermelho (pior qualidade) */
        .ConditionButtons button[data-condition="ruim"] {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .ConditionButtons button[data-condition="ruim"]:hover {
            background-color: #fdedec;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(231, 76, 60, 0.3);
        }

        .ConditionButtons button[data-condition="ruim"].active {
            background-color: #e74c3c;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5);
        }

        /* Animação de clique */
        .ConditionButtons button:active {
            transform: scale(0.95);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .ConditionButtons {
                flex-wrap: wrap;
                justify-content: center;
            }

            .ConditionButtons button {
                min-width: 120px;
                height: 50px;
                font-size: 12px;
            }
        }

        .TextoEstadoImovel {
            margin-top: 1%;
        }
    </style>
    <base target="_blank">

</head>



<body>
    <div class="header-logo-container">
        <img src="assets/Logo.png" alt="RE/MAX Litorânea - Vistoria de Imóveis" class="header-logo">
    </div>

    <form id="inspectionForm">
        <!-- Novo campo de rádio para tipo de laudo -->
        <div class="info-block">
            <div class="form-section">
                <h2>Tipo de Vistoria</h2>
                <div class="form-group">
                    <div class="radio-group">
                        <label><input type="radio" name="reportType" value="Inicial" required>
                            <span>Inicial</span></label>
                        <label><input type="radio" name="reportType" value="Final"> <span>Final</span></label>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px; display: flex;">
                    <label
                        style="display: flex; align-items: center; gap: 8px; font-weight: normal; text-transform: none; cursor: pointer; font-size: 1rem; justify-content: center;">
                        <input type="checkbox" id="vistoriaComplementar" name="vistoriaComplementar"
                            style="width: auto;">
                        <span>Vistoria Complementar</span>
                    </label>
                </div>
            </div>
        </div>
        <!-- Fim do novo campo -->
        <div class="info-block">
            <div class="form-section">
                <h2>Informações do Laudo</h2>
                <div class="form-group-row">
                    <!-- NOVO: Select de Estado e Município lado a lado -->
                    <div class="form-group">
                        <label for="estadoSelect">Estado:</label>
                        <select id="estadoSelect" name="estadoSelect" required>
                            <!-- Opções serão carregadas via JavaScript -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="municipioSelect">Município:</label>
                        <select id="municipioSelect" name="municipioSelect" required>
                            <!-- Opções serão carregadas via JavaScript baseado no estado -->
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group-row">
                <div class="form-group">
                    <label for="contractDate">Data do Contrato:</label>
                    <input type="date" id="contractDate" name="contractDate" required>
                </div>
                <div class="form-group">
                    <label for="reportDate">Data do Laudo:</label>
                    <input type="date" id="reportDate" name="reportDate" required>
                </div>
            </div>
        </div>
    </form>

    <div class="info-block">
        <div class="form-section">
            <h2>Informações do Corretor</h2>
            <div class="form-group">
                <label for="brokerName">Corretor(a):</label>
                <input type="text" id="brokerName" name="brokerName" required>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="creci">CRECI:</label>
                    <input type="text" id="creci" name="creci" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="XXX.XXX.XXX-XX" required>
                </div>
            </div>
        </div>
    </div>
    <div class="info-block">
        <div class="form-section">
            <h2>Informações do Imóvel</h2>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="landlord">Locador:</label>
                    <input type="text" id="landlord" name="landlord" required>
                </div>
                <div class="form-group">
                    <label for="tenant">Locatário:</label>
                    <input type="text" id="tenant" name="tenant" required>
                </div>
            </div>
            <div class="form-group">
                <label for="propertyAddress">Endereço do Imóvel:</label>
                <textarea id="propertyAddress" name="propertyAddress" required
                    placeholder="Endereço completo do imóvel"></textarea>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="propertyType">Tipo de Imóvel:</label>
                    <select id="propertyType" name="propertyType" required>
                        <option value="">Selecione</option>
                        <option value="Apartamento">Apartamento</option>
                        <option value="Casa">Casa</option>
                        <option value="Casa de Condominio">Casa de Condominio</option>
                        <option value="Terreno">Terreno</option>
                        <option value="Sala Comercial">Sala Comercial</option>
                        <option value="Sitio">Sitio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="destination">Destinação:</label>
                    <select id="destination" name="destination" required>
                        <option value="">Selecione</option>
                        <option value="Residencial">Residencial</option>
                        <option value="Aluguel">Aluguel</option>

    <script>
        const { jsPDF } = window.jspdf;

        // Arrays para armazenar itens e danos

        // Function to display custom messages
        function showMessage(message) {
            if (messageText && messageBox) {
                messageText.textContent = message;
                messageBox.style.display = 'block';
            } else {
                console.error("Message box elements not found.");
                alert(message); // Fallback to alert if message box not ready
            }
        }

        // Event listener for closing the message box
        // This will be attached inside DOMContentLoaded
        function closeMessageBox() {
            if (messageBox) {
                messageBox.style.display = 'none';

        // NOVO: Função para carregar dados dos arquivos JSON
        async function loadLocationData() {
            try {
                // Carregar estados
                const estadosResponse = await fetch('JSON/estados.json');
                estadosData = await estadosResponse.json();

                // Carregar municípios
                const municipiosResponse = await fetch('JSON/municipios.json');
                municipiosData = await municipiosResponse.json();

                // Popular select de estados
                populateEstadosSelect();

                // Definir BA (Bahia) como padrão e carregar seus municípios
                const bahiaId = 29; // ID da Bahia
                estadoSelect.value = bahiaId;
                updateMunicipiosSelect(bahiaId);

                // Selecionar Camaçari como padrão após carregar os municípios
                setTimeout(() => {
                    for (let i = 0; i < municipioSelect.options.length; i++) {
                        if (municipioSelect.options[i].value === 'Camaçari') {
                            municipioSelect.selectedIndex = i;
                            break;
                        }
                    }
                }, 100);

            } catch (error) {
                console.error('Erro ao carregar dados de localização:', error);
                showMessage('Erro ao carregar dados de estados e municípios. Verifique se os arquivos JSON estão disponíveis.');
            }
        }

        // NOVO: Função para popular o select de estados
        function populateEstadosSelect() {
            estadoSelect.innerHTML = '';
            estadosData.forEach(estado => {
                const option = document.createElement('option');
                option.value = estado.id;
                option.textContent = `${estado.name} (${estado.abbr})`;
                estadoSelect.appendChild(option);
            });
        }

        // NOVO: Função para atualizar o select de municípios baseado no estado
        function updateMunicipiosSelect(stateId) {
            municipioSelect.innerHTML = '';

            // Filtrar municípios do estado selecionado
            const municipiosFiltrados = municipiosData.filter(m => m.state_id === parseInt(stateId));

            // Ordenar por nome
            municipiosFiltrados.sort((a, b) => a.name.localeCompare(b.name));

            // Adicionar opções
            municipiosFiltrados.forEach(municipio => {
                const option = document.createElement('option');
                option.value = municipio.name;
                option.textContent = municipio.name;
                municipioSelect.appendChild(option);
            });
        }

        // Função para abrir a câmera
        async function openCamera(type, descriptionInput) {
            currentPhotoType = type;
            currentItemDescriptionInput = descriptionInput;
            if (cameraErrorMessage) cameraErrorMessage.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                if (cameraFeed) cameraFeed.srcObject = stream;
                if (cameraModal) cameraModal.style.display = 'flex';
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                if (cameraErrorMessage) {
                    cameraErrorMessage.textContent = 'Não foi possível acessar a câmera. Verifique as permissões.';
                    cameraErrorMessage.style.display = 'block';
                }
                showMessage('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
            }
        }

        // Função para fechar a câmera
        function closeCameraModal() {
            if (cameraFeed && cameraFeed.srcObject) {
                const stream = cameraFeed.srcObject;
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
            }
            if (cameraModal) cameraModal.style.display = 'none';
        }

        // Função para tirar foto
        function takePhoto() {
            if (!cameraCanvas || !cameraFeed) {
                console.error("Camera canvas or feed not available.");
                showMessage("Erro: Câmera não disponível para tirar foto.");
                return;
            }
            const context = cameraCanvas.getContext('2d');
            cameraCanvas.width = cameraFeed.videoWidth;
            cameraCanvas.height = cameraFeed.videoHeight;
            context.drawImage(cameraFeed, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const photoDataUrl = cameraCanvas.toDataURL('image/png');
            closeCameraModal();
            if (currentPhotoType === 'inspection') {
                addInspectionItem(currentItemDescriptionInput.value, photoDataUrl);
            } else if (currentPhotoType === 'damage') {
                addDamageItem(currentItemDescriptionInput.value, photoDataUrl);
            }
        }

        // Função para adicionar item de vistoria
        function addInspectionItem(description, photo = '') {
            if (description.trim() === '') {
                showMessage('A descrição do item de vistoria não pode ser vazia.');
                return;
            }
            const item = {
                id: inspectionItems.length + 1,
                description: description,
                photo: photo
            };
            inspectionItems.push(item);
            renderInspectionItems();
            if (inspectionItemDescriptionInput) inspectionItemDescriptionInput.value = '';
            if (noInspectionItemsRow) noInspectionItemsRow.style.display = 'none';
        }

        // Função para renderizar itens de vistoria na tabela
        function renderInspectionItems() {
            if (!inspectionItemsTableBody) return; // Ensure table body exists
            inspectionItemsTableBody.innerHTML = ''; // Limpa a tabela
            if (inspectionItems.length === 0) {
                if (noInspectionItemsRow) {
                    noInspectionItemsRow.style.display = 'table-row';
                    inspectionItemsTableBody.appendChild(noInspectionItemsRow);
                }
                return;
            }

            inspectionItems.forEach(item => {
                const row = inspectionItemsTableBody.insertRow();
                row.insertCell().textContent = item.id;
                row.insertCell().textContent = item.description;
                const imgCell = row.insertCell();
                if (item.photo) {
                    const img = document.createElement('img');
                    img.src = item.photo;
                    imgCell.appendChild(img);
                } else {
                    imgCell.textContent = 'N/A';
                }
                const actionsCell = row.insertCell();
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Excluir';
                deleteButton.className = 'button delete-button';
                deleteButton.onclick = () => deleteInspectionItem(item.id);
                actionsCell.appendChild(deleteButton);
            });
        }

        // Função para deletar item de vistoria
        function deleteInspectionItem(id) {
            inspectionItems = inspectionItems.filter(item => item.id !== id);
            inspectionItems.forEach((item, index) => {
                item.id = index + 1;
            });
            renderInspectionItems();
            if (inspectionItems.length === 0 && noInspectionItemsRow) {
                noInspectionItemsRow.style.display = 'table-row';
                inspectionItemsTableBody.appendChild(noInspectionItemsRow);
            }
        }

        // Função para adicionar dano encontrado
        function addDamageItem(description, photo = '') {
            if (description.trim() === '') {
                showMessage('A descrição do dano não pode ser vazia.');
                return;
            }
            const item = {
                id: damageItems.length + 1,
                description: description,
                photo: photo
            };
            damageItems.push(item);

            if (damageItemDescriptionInput) damageItemDescriptionInput.value = '';
            if (noDamageItemsRow) noDamageItemsRow.style.display = 'none';
        }

        // Função para renderizar danos na tabela
        function renderDamageItems() {
            if (!damageItemsTableBody) return; // Ensure table body exists
            damageItemsTableBody.innerHTML = ''; // Limpa a tabela
            if (damageItems.length === 0) {
                if (noDamageItemsRow) {
                    noDamageItemsRow.style.display = 'table-row';
                    damageItemsTableBody.appendChild(noDamageItemsRow);

            }

            damageItems.forEach(item => {

        // Função para deletar dano encontrado
        function deleteDamageItem(id) {
            damageItems = damageItems.filter(item => item.id !== id);
            damageItems.forEach((item, index) => {
                item.id = index + 1;
            });
            renderDamageItems();
            if (damageItems.length === 0 && noDamageItemsRow) {

        // Função para lidar com a seleção de arquivo de foto
        function handleFileSelect(event, type) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    if (type === 'inspection') {
                        addInspectionItem(inspectionItemDescriptionInput.value, e.target.result);
                    } else if (type === 'damage') {
                        addDamageItem(damageItemDescriptionInput.value, e.target.result);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        // Função para pré-carregar imagens e armazenar suas dimensões
        async function preloadImagesAndGetDimensions(items) {
            const imagePromises = items.map(item => {
                if (item.photo && item.photo !== 'N/A') {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.src = item.photo;
                        img.onload = () => {
                            item.loadedImage = img; // Store the loaded image object
                            item.naturalWidth = img.naturalWidth;
                            item.naturalHeight = img.naturalHeight;
                            resolve();
                        };
                        img.onerror = () => {
                            console.warn(`Falha ao carregar imagem para o item: ${item.description}`);
                            item.loadedImage = null; // Mark as failed
                            item.naturalWidth = 0;
                            item.naturalHeight = 0;
                            resolve();
                        };
                    });
                }
                return Promise.resolve(); // No photo or already N/A
            });
            await Promise.all(imagePromises);
        }

        // Função para gerar PDF
        async function generatePDF() {
            const doc = new jsPDF({ margin: { bottom: 40 } });
            let yPos = 15;
            const margin = 10;
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const contentHeight = pageHeight - 40; // Reserve 40 points for footer

            // Pré-carregar todas as imagens das tabelas antes de gerar o PDF
            await preloadImagesAndGetDimensions(inspectionItems);
            await preloadImagesAndGetDimensions(damageItems);

            // Load single logo image (LOGO.PNG)
            const logoUrl = "LOGO.PNG";

            const loadedLogo = await new Promise((resolve) => {
                const img = new Image();
                img.src = logoUrl;
                img.onload = () => resolve(img);
                img.onerror = () => {
                    console.warn(`Failed to load logo: ${logoUrl}`);
                    resolve(null);
                };
            });

            // Render logo using full page width while maintaining aspect ratio
            if (loadedLogo) {
                const maxWidth = pageWidth - (2 * margin); // Full width minus margins
                const aspectRatio = loadedLogo.naturalHeight / loadedLogo.naturalWidth;
                const logoWidth = maxWidth;
                const logoHeight = logoWidth * aspectRatio;

                doc.addImage(loadedLogo, 'PNG', margin, yPos, logoWidth, logoHeight);
                yPos += logoHeight + 15; // Adjust yPos after adding logo
            }

            // Título "Laudo de Vistoria"
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text("Laudo de Vistoria", pageWidth / 2, yPos, { align: "center" });
            yPos += 10;

            // Linha vermelha abaixo do título (como no estilo REMAX)
            doc.setDrawColor(230, 14, 22); // Cor vermelha (remax-red)
            doc.setLineWidth(0.75);
            doc.line(margin, yPos, pageWidth - margin, yPos);
            yPos += 15; // Aumenta o yPos para o conteúdo abaixo da linha

            // Coletar dados dos campos
            const reportType = document.querySelector('input[name="reportType"]:checked') ? document.querySelector('input[name="reportType"]:checked').value : 'Não informado';
            const isVistoriaComplementar = vistoriaComplementarCheckbox && vistoriaComplementarCheckbox.checked;
            const complementarText = isVistoriaComplementar ? ' COMPLEMENTAR' : '';

            // MODIFICADO: Pegar o nome do município e estado selecionados
            const municipio = municipioSelect ? municipioSelect.value : '';

            // NOVO: Pegar a sigla do estado selecionado
            const estadoId = estadoSelect ? parseInt(estadoSelect.value) : 0;
            const estadoObj = estadosData.find(e => e.id === estadoId);
            const estado = estadoObj ? estadoObj.abbr : '';

            const reportDateValue = reportDateInput && reportDateInput.value ? reportDateInput.value : '';
            const brokerName = brokerNameInput ? (brokerNameInput.value || '') : '';
            const cpf = cpfInput ? (cpfInput.value || '') : '';
            const creci = creciInput ? (creciInput.value || '') : '';
            const propertyType = propertyTypeSelect ? (propertyTypeSelect.value || '') : '';
            const destination = destinationSelect ? (destinationSelect.value || '') : '';
            const propertyAddress = propertyAddressTextarea ? (propertyAddressTextarea.value || '') : '';
            const landlord = landlordInput ? (landlordInput.value || '') : '';
            const tenant = tenantInput ? (tenantInput.value || '') : '';
            const contractDate = contractDateInput && contractDateInput.value ? new Date(contractDateInput.value).toLocaleDateString('pt-BR') : '';

            // Texto dinâmico com valores em NEGRITO
            // Função auxiliar para renderizar texto justificado com alternância entre normal e negrito
            function renderTextWithBold(doc, textParts, startX, startY, maxWidth) {
                const lineHeight = 6; // Altura da linha em pontos
                const fontSize = 10;
                doc.setFontSize(fontSize);

                let currentY = startY;
                let currentLineWords = [];
                let currentLineWidth = 0;

                // Processar cada parte do texto
                for (let i = 0; i < textParts.length; i++) {
                    const part = textParts[i];
                    const words = part.text.split(' ');

                    for (let j = 0; j < words.length; j++) {
                        const word = words[j];
                        const wordWithSpace = j < words.length - 1 ? word + ' ' : word;
                        doc.setFont("helvetica", part.bold ? "bold" : "normal");
                        const wordWidth = doc.getTextWidth(wordWithSpace);

                        // Verifica se a palavra cabe na linha atual
                        if (currentLineWidth + wordWidth > maxWidth && currentLineWords.length > 0) {
                            // Renderiza a linha atual justificada
                            renderJustifiedLine(doc, currentLineWords, startX, currentY, maxWidth, currentLineWidth - doc.getTextWidth(' '));

                            // Nova linha
                            currentY += lineHeight;
                            currentLineWords = [];
                            currentLineWidth = 0;
                        }

                        // Adiciona palavra à linha atual
                        currentLineWords.push({
                            text: word,
                            bold: part.bold,
                            spaceAfter: j < words.length - 1
                        });
                        currentLineWidth += wordWidth;
                    }
                }

                // Renderiza a última linha (alinhada à esquerda, não justificada)
                if (currentLineWords.length > 0) {
                    let x = startX;
                    for (const word of currentLineWords) {
                        doc.setFont("helvetica", word.bold ? "bold" : "normal");
                        doc.setFontSize(fontSize);
                        doc.text(word.text, x, currentY);
                        doc.setFont("helvetica", word.bold ? "bold" : "normal");
                        const spaceWidth = doc.getTextWidth(' ');
                        x += doc.getTextWidth(word.text) + (word.spaceAfter ? spaceWidth : 0);
                    }
                    currentY += lineHeight;
                }

                return currentY;
            }

            function renderJustifiedLine(doc, lineWords, startX, y, maxWidth, lineWidth) {
                if (lineWords.length === 0) return;

                const fontSize = 10;
                doc.setFontSize(fontSize);

                // Se for apenas uma palavra ou linha curta, não justifica
                if (lineWords.length === 1) {
                    doc.setFont("helvetica", lineWords[0].bold ? "bold" : "normal");
                    doc.text(lineWords[0].text, startX, y);
                    return;
                }

                // Calcula o espaço extra a ser distribuído
                const totalSpaces = lineWords.length - 1;
                const extraSpace = maxWidth - lineWidth;
                const spacePerGap = totalSpaces > 0 ? extraSpace / totalSpaces : 0;

                let x = startX;
                for (let i = 0; i < lineWords.length; i++) {
                    const word = lineWords[i];
                    doc.setFont("helvetica", word.bold ? "bold" : "normal");
                    doc.text(word.text, x, y);

                    // Move x para a próxima palavra
                    const wordWidth = doc.getTextWidth(word.text);
                    x += wordWidth;

                    // Adiciona espaço entre palavras (com justificação)
                    if (i < lineWords.length - 1) {
                        const spaceWidth = doc.getTextWidth(' ');
                        x += spaceWidth + spacePerGap;
                    }
                }
            }

            // Function to add a table to the PDF
            const addTableToPDF = (doc, items, tableTitle, startY) => {
                // Padding reduzido para 1mm (0.1cm)
                const cellPaddingPoints = 0.1 * 28.3465;

                // Calculate header height dynamically
                const headerText = ["Nº", "DESCRIÇÃO", "FOTO"]; // Base texts for measurement
                const tempDoc = new jsPDF(); // Temporary doc to measure text
                tempDoc.setFontSize(10); // Assuming header font size is 10
                tempDoc.setFont("helvetica", "bold");
                let maxHeaderTextHeight = 0;
                headerText.forEach(text => {
                    const textDimensions = tempDoc.getTextDimensions(text);
                    if (textDimensions.h > maxHeaderTextHeight) {
                        maxHeaderTextHeight = textDimensions.h;
                    }
                });
                const headerMinHeightPoints = maxHeaderTextHeight * 2; // Double the necessary height

                let descriptionHeaderContent = "DESCRIÇÃO";
                if (tableTitle.includes("Vistoria")) {

                } else if (tableTitle.includes("Danos")) {

                const tableHeaders = [

                ];

                const tableBody = items.map(item => [
                    item.id,
                    item.description,
                    '' // Pass empty string for photo data to prevent raw base64 text
                ]);

                const targetImageHeightCm = 1.5; // Altura da imagem em cm
                const paddingCm = 0.1; // 1mm acima e 1mm abaixo = 0.1cm cada
                const cellHeightCm = targetImageHeightCm + (2 * paddingCm); // 1.5cm + 0.2cm = 1.7cm total
                const cellHeightPoints = cellHeightCm * 28.3465;

                doc.setFontSize(18);
                doc.setFont("helvetica", "bold");
                doc.text(tableTitle, pageWidth / 2, startY, { align: "center" });
                startY += 10;
                doc.setDrawColor(230, 14, 22); // Red line
                doc.setLineWidth(0.75);
                doc.line(margin, startY, pageWidth - margin, startY);
                startY += 15;

                doc.autoTable({
                    showHead: 'firstPage',
                    rowPageBreak: 'avoid', // Prevent rows from splitting across pages
                    startY: startY,
                    head: [tableHeaders.map(h => h.content)], // Use content for display
                    body: tableBody,
                    theme: 'grid',
                    styles: {
                        font: 'helvetica',
                        fontSize: 10,
                        textColor: [51, 51, 51], // #333
                        lineColor: [187, 187, 187], // --remax-medium-gray
                        lineWidth: 0.1,
                        cellPadding: cellPaddingPoints // Apply global padding to all cells
                    },
                    headStyles: {
                        fillColor: [240, 240, 240], // #f0f0f0
                        textColor: [68, 68, 68], // #444
                        fontStyle: 'bold',
                        minCellHeight: headerMinHeightPoints, // Set header height
                        halign: 'center', // Horizontal alignment for headers
                        valign: 'middle' // Vertical alignment for headers
                    },
                    columnStyles: {
                        0: { cellWidth: 35, halign: 'center', valign: 'middle' }, // Column 0: 'Nº'
                        1: { cellWidth: 'auto', halign: 'left', valign: 'middle' }, // Column 1: 'ITEM' or 'Item Danificado'
                        2: { // Column 2: 'FOTO'
                            cellWidth: cellHeightCm * 28.3465, // Adjust width to be proportional to 3cm height + padding
                            minCellHeight: cellHeightPoints, // Ensure row height accommodates 4cm
                            halign: 'center',
                            valign: 'middle'
                        }
                    },
                    didDrawCell: function (data) {
                        if (data.section === 'body' && data.column.index === 2) { // Check column index for 'FOTO'
                            const item = items[data.row.index];

                            if (item && item.loadedImage) {
                                const img = item.loadedImage;

                                let finalImageHeightPoints = targetImageHeightCm * 28.3465;
                                let finalImageWidthPoints = (img.naturalWidth / img.naturalHeight) * finalImageHeightPoints;

                                // Garantir que largura e altura cabem dentro da célula
                                if (finalImageWidthPoints > data.cell.width) {
                                    const scaleFactor = data.cell.width / finalImageWidthPoints;
                                    finalImageWidthPoints *= scaleFactor;
                                    finalImageHeightPoints *= scaleFactor;
                                }
                                if (finalImageHeightPoints > data.cell.height) {
                                    const scaleFactorH = data.cell.height / finalImageHeightPoints;
                                    finalImageHeightPoints *= scaleFactorH;
                                    finalImageWidthPoints *= scaleFactorH;
                                }

                                // Centralizar a imagem na célula
                                const x = data.cell.x + (data.cell.width - finalImageWidthPoints) / 2;
                                const y = data.cell.y + (data.cell.height - finalImageHeightPoints) / 2;

                                doc.addImage(img.src, 'PNG', x, y, finalImageWidthPoints, finalImageHeightPoints);
                            }
                            data.cell.text = []; // Ensure no text is rendered
                        }
                    },
                    didParseCell: function (data) {
                        if (data.section === 'body' && data.column.index === 2) { // Check column index for 'FOTO'
                            data.cell.styles.minCellHeight = cellHeightPoints;
                        }
                    }
                });

                // Update yPos after table
                return doc.autoTable.previous.finalY + 15; // Add some space after the table

            // Adicionar tabela de Itens da Vistoria

            const addSignatures = () => {
                const footerSpace = 45; // Espaço reservado para rodapé

                // Verificar se há espaço suficiente na página atual
                const lastPageY = doc.autoTable.previous ? doc.autoTable.previous.finalY : yPos;

                // Se não houver espaço suficiente para assinaturas + rodapé, adicionar nova página
                if (lastPageY + signatureBlockHeight + footerSpace > pageHeight) {

                } else {

                }

                let sigY = yPos;

                doc.setFontSize(10);

                const signatureLineLength = 70;

                // Locador e Locatário (lado a lado, centralizados)
                const totalWidth = (signatureLineLength * 2) + spacingBetweenSignatures;

                doc.text(brokerName || "CORRETOR", pageWidth / 2, sigY + 20 + textOffset, { align: "center" });
            };

            // Call signatures function to add them on last page
            addSignatures();

            // Footer com informações da empresa (esquerda) e numeração (direita)
            const addFooter = () => {
                const pageCount = doc.internal.getNumberOfPages();
                const footerY = pageHeight - 12; // Position from bottom

            // Adicionar assinaturas e rodapé
            addSignatures();

            const landlordName = landlordInput ? (landlordInput.value || 'Locador').replace(/[^a-zA-Z0-9]/g, '_') : 'Locador';
            const tenantName = tenantInput ? (tenantInput.value || 'Locatario').replace(/[^a-zA-Z0-9]/g, '_') : 'Locatario';

        // Função para converter Data URL para Blob
        function dataURLToBlob(dataURL) {
            const byteString = atob(dataURL.split(',')[1]);
            const mimeString = dataURL.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }

        // Função para salvar fotos em arquivo ZIP
        async function savePhotosToZip() {
            if (inspectionItems.length === 0 && damageItems.length === 0) {
                showMessage('Não há fotos para salvar. Adicione itens ou danos com fotos primeiro.');
                return;
            }

            const zip = new JSZip();
            const itensFolder = zip.folder("1_ITENS");
            const danosFolder = zip.folder("2_DANOS");
            let hasPhotos = false;

            // Processar fotos dos ITENS
            for (let i = 0; i < inspectionItems.length; i++) {
                const item = inspectionItems[i];
                if (item.photo && item.photo !== '') {
                    hasPhotos = true;
                    // Sanitizar o nome do arquivo (remover caracteres inválidos)
                    const safeDescription = item.description.replace(/[^a-zA-Z0-9À-ÿ\s]/g, '').substring(0, 50);
                    const fileName = `${item.id}_${safeDescription}.png`;

                    // Converter Data URL para Blob
                    const blob = dataURLToBlob(item.photo);
                    itensFolder.file(fileName, blob);
                }
            }

            // Processar fotos dos DANOS
            for (let i = 0; i < damageItems.length; i++) {
                const item = damageItems[i];
                if (item.photo && item.photo !== '') {
                    hasPhotos = true;
                    // Sanitizar o nome do arquivo
                    const safeDescription = item.description.replace(/[^a-zA-Z0-9À-ÿ\s]/g, '').substring(0, 50);
                    const fileName = `${item.id}_${safeDescription}.png`;

                    // Converter Data URL para Blob
                    const blob = dataURLToBlob(item.photo);
                    danosFolder.file(fileName, blob);
                }
            }

            if (!hasPhotos) {
                showMessage('Não há fotos para salvar. Adicione fotos aos itens ou danos primeiro.');
                return;
            }

            try {
                // Gerar o arquivo ZIP
                const content = await zip.generateAsync({ type: "blob" });

                // Obter data atual para o nome do arquivo
                const now = new Date();
                const dateStr = now.toISOString().split('T')[0];

                // Salvar o arquivo
                saveAs(content, `FOTOS_VISTORIA_${dateStr}.zip`);

                // showMessage('Arquivo ZIP gerado com sucesso!');
            } catch (error) {
                console.error('Erro ao gerar ZIP:', error);
                showMessage('Erro ao gerar arquivo ZIP. Tente novamente.');
            }
        }
