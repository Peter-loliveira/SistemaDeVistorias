<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo de Vistoria</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Variáveis de Cor RE/MAX */
        :root {
            --remax-blue: #003da5;
            --remax-red: #e60e16;
            --remax-light-gray: #cccccc;
            --remax-medium-gray: #bbbbbb;
            --remax-dark-gray: #aaaaaa;
        }

        /* Estilos Gerais */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--remax-light-gray);
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-grow: 1;
        }

        h1 {
            color: var(--remax-blue);
            text-align: center;
            margin-bottom: 25px;
            padding: 25px 0;
            border-bottom: 3px solid var(--remax-blue);
            background-color: #f9f9f9;
            border-radius: 8px 8px 0 0;
            margin-top: -30px;
            margin-left: -30px;
            margin-right: -30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h1 .logo {
            height: 100px;
            /* Altura fixa para o logo */
            width: auto;
            /* Mantém a proporção */
            vertical-align: middle;
            margin-right: 0;
            /* Ajustado para centralizar */
        }

        h2 {
            color: var(--remax-blue);
            margin-top: 35px;
            border-bottom: 1px solid var(--remax-medium-gray);
            padding-bottom: 10px;
            text-align: center;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input,
        input::placeholder,
        textarea,
        textarea::placeholder,
        select {
            font-size: 1rem;
            color: #333;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input {
            -moz-appearance: textfield;
        }

        input::-ms-clear {
            display: none;
        }

        input::-ms-reveal {
            display: none;
        }

        input,
        input::-webkit-input-placeholder,
        textarea,
        textarea::-webkit-input-placeholder,
        select {
            opacity: 1;
            /* Prevents iOS placeholder color bug */
        }

        input::-moz-placeholder,
        textarea::-moz-placeholder,
        select::-moz-placeholder {
            color: #777;
            opacity: 1;
        }

        input:-ms-input-placeholder,
        textarea:-ms-input-placeholder,
        select:-ms-input-placeholder {
            color: #777;
            opacity: 1;
        }

        input::placeholder,
        textarea::placeholder,
        select::placeholder {
            color: #777;
            opacity: 1;
        }

        input:focus::-webkit-input-placeholder { color: transparent;
        }
        textarea:focus::-webkit-input-placeholder { color: transparent;
        }
        select:focus::-webkit-input-placeholder { color: transparent;
        }
        input:focus::-moz-placeholder { color: transparent;
        }
        textarea:focus::-moz-placeholder { color: transparent;
        }
        select:focus::-moz-placeholder { color: transparent;
        }
        input:focus:-ms-input-placeholder { color: transparent;
        }
        textarea:focus:-ms-input-placeholder,
        select:focus:-ms-input-placeholder { color: transparent;
        }
        input:focus::placeholder { color: transparent;
        }
        textarea:focus::placeholder { color: transparent;
        }
        select:focus::placeholder { color: transparent;
        }

        input,
        input::-webkit-input-placeholder,
        textarea,
        textarea::-webkit-input-placeholder,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--remax-medium-gray);
            border-radius: 5px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: 'Roboto', sans-serif;
            /* Garante consistência da fonte */
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--remax-blue);
            box-shadow: 0 0 5px rgba(0, 61, 165, 0.5);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Layout Específico: Estado do Imóvel */
        .form-group.estado-imovel {
            flex-direction: row;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; /* Permite quebrar linha em telas menores */
        }

        .form-group.estado-imovel label {
            margin-bottom: 0;
            flex-shrink: 0; /* Impede que o label encolha */
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 0; /* Conforme requisito */
            justify-content: center; /* Centraliza as opções de rádio */
            width: 100%; /* Garante que o radio-group ocupe toda a largura disponível */
        }

        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
            color: #555; /* Cor padrão não selecionado */
            transition: color 0.3s ease;
            font-size: 1rem; /* Garante consistência da fonte */
        }

        .radio-group input {
            margin-right: 8px;
            width: auto;
        }

        .radio-group input:checked + span {
            color: var(--remax-blue);
            font-weight: bold;
        }

        /* Botões */
        .button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.3s ease;
            height: 40px;
            min-height: 40px;
            font-weight: bold;
            white-space: nowrap; /* Previne quebra de linha em botões com ícone e texto */
        }
        .button.icon-only { /* Novo estilo para botões apenas com ícone */
            padding: 0;
            width: 40px;
            height: 40px;
            gap: 0;
        }

        .button .material-icons {
            font-size: 1.5rem;
        }

        .primary-button {
            background-color: var(--remax-blue);
            color: #fff;
        }

        .primary-button:hover {
            background-color: #3366bb;
        }

        .delete-button {
            background-color: var(--remax-red);
            color: #fff;
        }

        .delete-button:hover {
            background-color: #ff4d4d;
        }

        .pdf-button {
            background-color: var(--remax-red);
            color: #fff;
            margin-top: 30px;
            width: 100%;
        }

        .pdf-button:hover {
            background-color: #ff4d4d;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .input-with-buttons .action-buttons .button {
            flex-grow: 0;
            max-width: none;
        }

        .action-buttons .button {
            flex-grow: 1;
            max-width: 200px;
        }

        /* Tabelas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        th, td {
            border: 1px solid var(--remax-medium-gray);
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: #f0f0f0;
            font-weight: bold;
            color: #444;
        }

        td img {
            max-width: 100px;
            max-height: 100px;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .no-records {
            text-align: center;
            color: #777;
            padding: 20px;
            font-style: italic;
        }

        /* Modal da Câmera */
        .camera-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .camera-modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .camera-modal-content video {
            width: 100%;
            max-height: 400px;
            background-color: #000;
            border-radius: 5px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .camera-modal-content canvas {
            display: none;
        }

        .camera-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .camera-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .camera-modal-close:hover,
        .camera-modal-close:focus {
            color: var(--remax-red);
        }

        .camera-error-message {
            color: var(--remax-red);
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* Novo estilo para blocos de informação */
        .info-block {
            border: 1px solid var(--remax-medium-gray);
            border-radius: 8px;
            padding: 0px 20px 20px 20px;
            margin-top: 20px;
            margin-bottom: 20px;
            background-color: #fcfcfc;
        }

        .info-block h3 {
            text-align: center;
            color: var(--remax-blue);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .info-block .form-group {
            margin-bottom: 15px;
        }

        .info-block .form-group:last-child {
            margin-bottom: 0;
        }

        /* Estilos para agrupar campos lado a lado */
        .form-group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 18px;
        }

        .form-group-row .form-group {
            flex: 1;
            min-width: 250px;
            margin-bottom: 0;
        }
        .form-group-row .form-group label {
            text-align: center;
            width: 100%;
        }

               /* Rodapé */
        /* REMOVIDO: O rodapé e seus textos foram removidos conforme solicitação */

        /* Novo estilo para agrupar input e botões */
        .input-with-buttons {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 18px;
        }

        .input-with-buttons .form-group {
            flex-grow: 1;
            margin-bottom: 0;
        }

        .input-with-buttons .action-buttons {
            display: flex;
            gap: 5px;
            margin-top: 0;
            justify-content: flex-start;
            align-items: flex-end;
            margin-bottom: 0;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 10px auto;
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
                margin-left: -20px;
                margin-right: -20px;
                border-radius: 8px 8px 0 0;
                flex-direction: column;
                /* Empilha logo e título */
                padding-left: 0;
                /* Remove padding extra */
                padding-top: 20px;
                /* Ajuste para dar mais espaço em telas menores */
                padding-bottom: 20px;
            }

            h1 .logo {
                position: static;
                /* Remove posicionamento absoluto */
                margin-bottom: 10px;
                /* Espaço abaixo do logo */
                height: 80px;
                /* Ajuste o tamanho para telas menores */
            }

            h2 {
                font-size: 1.4rem;
            }

            .form-group.estado-imovel,
            .form-group-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .form-group-row .form-group {
                min-width: 100%;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons .button {
                max-width: 100%;
            }
            .action-buttons .button.icon-only {
                max-width: 40px;
            }

            .input-with-buttons {
                flex-direction: column;
                align-items: stretch;
            }
            .input-with-buttons .action-buttons {
                justify-content: center;
                margin-top: 10px;
            }

            th, td {
                padding: 8px;
                font-size: 0.9rem;
            }

            td img {
                max-width: 80px;
                max-height: 80px;
            }

            .info-block {
                padding: 15px;
            }
        }

        /* REMOVIDO: .textFooter foi removido conforme solicitação */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
                margin-left: -15px;
                margin-right: -15px;
                border-radius: 8px 8px 0 0;
            }

            h2 {
                font-size: 1.2rem;
            }

            .camera-modal-content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <img src="LOGO.png" alt="Logotipo do Sistema" class="logo">
        </h1>
        <!-- Novo campo de rádio para tipo de laudo -->
        <div class="info-block">
            <h3>Tipo de Vistoria</h3>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="reportType" value="Inicial" required> <span>Inicial</span></label>
                    <label><input type="radio" name="reportType" value="Final"> <span>Final</span></label>
                </div>
            </div>
        </div>
        <!-- Fim do novo campo -->

        <form id="inspectionForm">
            <div class="form-section">
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="municipioSelect">Município:</label>
                        <div class="form-group">
                        <select id="municipioSelect" name="municipioSelect" required>
                            <option value="Camaçari" selected>Camaçari</option>
                            <option value="Lauro de Freitas">Lauro de Freitas</option>
                            <option value="Salvador">Salvador</option>
                        </select>
                            
                        </div>
                        <div class="form-group">
                            <input type="text" id="selectedMunicipioText" name="selectedMunicipioText" value="Camaçari" >
                        </div>
                    </div>
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="reportDate">Data do Laudo:</label>
                        <input type="date" id="reportDate" name="reportDate" required>
                    </div>
                    <div class="form-group">
                        <label for="contractDate">Data do Contrato:</label>
                        <input type="date" id="contractDate" name="contractDate" required>
                    </div>
                </div>
                <div class="info-block">
                    <h3>Informações do Corretor</h3>
                    <div class="form-group">
                        <label for="brokerName">Corretor(a):</label>
                        <input type="text" id="brokerName" name="brokerName" required>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="creci">CRECI:</label>
                            <input type="text" id="creci" name="creci" required>
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF:</label>
                            <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="XXX.XXX.XXX-XX" required>
                        </div>
                    </div>
                </div>
                <div class="info-block">
                    <h3>Informações do Imóvel</h3>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="landlord">Locador:</label>
                            <input type="text" id="landlord" name="landlord" required>
                        </div>
                        <div class="form-group">
                            <label for="tenant">Locatário:</label>
                            <input type="text" id="tenant" name="tenant" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="propertyAddress">Endereço do Imóvel:</label>
                        <textarea id="propertyAddress" name="propertyAddress" required placeholder="Endereço completo do imóvel"></textarea>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="propertyType">Tipo de Imóvel:</label>
                            <select id="propertyType" name="propertyType" required>
                                <option value="">Selecione</option>
                                <option value="Apartamento">Apartamento</option>
                                <option value="Casa">Casa</option>
                                <option value="Casa de Condominio">Casa de Condominio</option>
                                <option value="Terreno">Terreno</option>
                                <option value="Sala Comercial">Sala Comercial</option>
                                <option value="Sitio">Sitio</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="destination">Destinação:</label>
                            <select id="destination" name="destination" required>
                                <option value="">Selecione</option>
                                <option value="Residencial">Residencial</option>
                                <option value="Comercial">Comercial</option>
                                <option value="Aluguel de Temporada">Aluguel de Temporada</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group estado-imovel">
                        <label>Estado do Imóvel:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="propertyState" value="Novo" required> <span>Novo</span></label>
                            <label><input type="radio" name="propertyState" value="Excelente"> <span>Excelente</span></label>
                            <label><input type="radio" name="propertyState" value="Bom"> <span>Bom</span></label>
                            <label><input type="radio" name="propertyState" value="Regular"> <span>Regular</span></label>
                            <label><input type="radio" name="propertyState" value="Ruim"> <span>Ruim</span></label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="info-block">
                <div class="form-section">
                    <h2>Itens da Vistoria.</h2>
                    <div class="input-with-buttons">
                        <div class="form-group">
                            <label for="inspectionItemDescription">Descrição do Item:</label>
                            <input type="text" id="inspectionItemDescription" placeholder="Ex: Porta da sala, parede da cozinha, etc.">
                        </div>
                        <div class="action-buttons">
                            <button type="button" class="button primary-button icon-only" id="openCameraInspection">
                                <span class="material-icons">camera_alt</span>
                            </button>
                            <input type="file" id="selectPhotoInspection" accept="image/*" style="display: none;">
                            <button type="button" class="button primary-button icon-only" id="triggerSelectPhotoInspection">
                                <span class="material-icons">collections</span>
                            </button>
                        </div>
                    </div>
                    <table id="inspectionItemsTable">
                        <thead>
                            <tr>
                                <th>Nº</th>
                                <th>ITEM</th>
                                <th>FOTO</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="noInspectionItems" class="no-records">
                                <td colspan="4">Nenhum item de vistoria adicionado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="info-block">
                <div class="form-section">
                    <h2>Danos Encontrados.</h2>
                    <div class="input-with-buttons">
                        <div class="form-group">
                            <label for="damageItemDescription">Descrição do Dano:</label>
                            <input type="text" id="damageItemDescription" placeholder="Ex: Vidro quebrado, pintura descascada, etc.">
                        </div>
                        <div class="action-buttons">
                            <button type="button" class="button primary-button icon-only" id="openCameraDamage">
                                <span class="material-icons">camera_alt</span>
                            </button>
                            <input type="file" id="selectPhotoDamage" accept="image/*" style="display: none;">
                            <button type="button" class="button primary-button icon-only" id="triggerSelectPhotoDamage">
                                <span class="material-icons">collections</span>
                            </button>
                        </div>
                    </div>
                    <table id="damageItemsTable">
                        <thead>
                            <tr>
                                <th>Nº</th>
                                <th>Item Danificado</th>
                                <th>Foto</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="noDamageItems" class="no-records">
                                <td colspan="4">Nenhum dano adicionado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <button type="button" class="button pdf-button" id="generatePdf">
                <span class="material-icons">picture_as_pdf</span> Gerar PDF
            </button>
        </form>
    </div>

    <div id="cameraModal" class="camera-modal">
        <div class="camera-modal-content">
            <span class="camera-modal-close" id="cameraModalClose">&times;</span> <h2>Pré-visualização da Câmera</h2>
            <video id="cameraFeed" autoplay playsinline></video>
            <canvas id="cameraCanvas" style="display:none;"></canvas>
            <p id="cameraErrorMessage" class="camera-error-message" style="display:none;"></p>
            <div class="camera-modal-buttons">
                <button type="button" class="button primary-button icon-only" id="takePhoto">
                    <span class="material-icons">camera</span>
                </button>
                <button type="button" class="button delete-button" id="cancelCamera">
                    <span class="material-icons">cancel</span> Cancelar
                </button>
            </div>
        </div>
    </div>

    <div id="messageBox" style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #f8d7da;
        color: #721c24;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        z-index: 1001;
        text-align: center;
        font-weight: bold;
        border: 1px solid #f5c6cb;
        max-width: 80%;
    ">
        <p id="messageText"></p>
        <button id="closeMessageBox" style="
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        ">OK</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.js"></script>
    <script>
        const { jsPDF } = window.jspdf;

        // Arrays para armazenar itens e danos
        let inspectionItems = [];
        let damageItems = [];

        // Elementos do DOM (agora inicializados dentro de DOMContentLoaded)

        // Função para abrir a câmera
        async function openCamera(type, descriptionInput) {
            currentPhotoType = type;
            currentItemDescriptionInput = descriptionInput;
            if (cameraErrorMessage) cameraErrorMessage.style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                if (cameraFeed) cameraFeed.srcObject = stream;
                if (cameraModal) cameraModal.style.display = 'flex';
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                if (cameraErrorMessage) {
                    cameraErrorMessage.textContent = 'Não foi possível acessar a câmera. Verifique as permissões.';
                    cameraErrorMessage.style.display = 'block';
                }
                showMessage('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
            }
        }

        // Função para fechar a câmera
        function closeCameraModal() {
            if (cameraFeed && cameraFeed.srcObject) {
                const stream = cameraFeed.srcObject;
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
            }
            if (cameraModal) cameraModal.style.display = 'none';
        }

        // Função para tirar foto
        function takePhoto() {
            if (!cameraCanvas || !cameraFeed) {
                console.error("Camera canvas or feed not available.");
                showMessage("Erro: Câmera não disponível para tirar foto.");
                return;
            }
            const context = cameraCanvas.getContext('2d');
            cameraCanvas.width = cameraFeed.videoWidth;
            cameraCanvas.height = cameraFeed.videoHeight;
            context.drawImage(cameraFeed, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const photoDataUrl = cameraCanvas.toDataURL('image/png');
            closeCameraModal();
            if (currentPhotoType === 'inspection') {
                addInspectionItem(currentItemDescriptionInput.value, photoDataUrl);
            } else if (currentPhotoType === 'damage') {
                addDamageItem(currentItemDescriptionInput.value, photoDataUrl);
            }
        }

        // Função para adicionar item de vistoria

            const item = {
                id: inspectionItems.length + 1,
                description: description,
                photo: photo
            };
            inspectionItems.push(item);
            renderInspectionItems();
            if (inspectionItemDescriptionInput) inspectionItemDescriptionInput.value = '';
            if (noInspectionItemsRow) noInspectionItemsRow.style.display = 'none';

        // Função para renderizar itens de vistoria na tabela
        function renderInspectionItems() {

            inspectionItems.forEach(item => {
                const row = inspectionItemsTableBody.insertRow();
                row.insertCell().textContent = item.id;
                row.insertCell().textContent = item.description;
                const imgCell = row.insertCell();
                if (item.photo) {

                    img.src = item.photo;
                    imgCell.appendChild(img);

        // Função para pré-carregar imagens e armazenar suas dimensões
        async function preloadImagesAndGetDimensions(items) {
            const imagePromises = items.map(item => {
                if (item.photo && item.photo !== 'N/A') {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.src = item.photo;
                        img.onload = () => {
                            item.loadedImage = img; // Store the loaded image object
                            item.naturalWidth = img.naturalWidth;
                            item.naturalHeight = img.naturalHeight;
                            resolve();
                        };
                        img.onerror = () => {
                            console.warn(`Falha ao carregar imagem para o item: ${item.description}`);
                            item.loadedImage = null; // Mark as failed
                            item.naturalWidth = 0;
                            item.naturalHeight = 0;
                            resolve();
                        };
                    });
                }
                return Promise.resolve(); // No photo or already N/A
            });
            await Promise.all(imagePromises);
        }

            // Texto dinâmico
            const dynamicText = `Este é um Laudo de Vistoria ${reportType}, executada pelo(a) corretor(a) ${brokerName}, inscrito no CPF sob o nº ${cpf}, registrado(a) no CRECI-BA sob o nº ${creci}, em imóvel do tipo ${propertyType}, com destinação do tipo ${destination} situado no(a) ${propertyAddress}, no municipio de ${municipio}, de propriedade do(a) Sr.(a) ${landlord}, que foi locado para o(a) Sr.(a) ${tenant}. O presente “laudo de vistoria” foi executado pelos abaixo assinados e passa a ser parte integrante do CONTRATO DE LOCAÇÃO datado de ${contractDate}, para todos os fins e efeitos de direito.`;

            doc.setFontSize(10);

            doc.text(splitText, margin, yPos);

            // Acrescentar no PDF, após o texto já incluso, uma informação sobre o "Estado do Imóvel" com a informação que foi selecionada
            const propertyState = document.querySelector('input[name="propertyState"]:checked') ? document.querySelector('input[name="propertyState"]:checked').value : 'Não informado';

            doc.text(`Estado do Imóvel: ${propertyState}`, margin, yPos);
            yPos += 15; // Adjusted yPos for the single line

            // Function to add a table to the PDF
            const addTableToPDF = (doc, items, tableTitle, startY) => {
                // Convert 0.5cm to points for padding
                const cellPaddingPoints = 0.5 * 28.3465;

                // Calculate header height dynamically
                const headerText = ["Nº", "DESCRIÇÃO", "FOTO"]; // Base texts for measurement
                const tempDoc = new jsPDF(); // Temporary doc to measure text
                tempDoc.setFontSize(10); // Assuming header font size is 10

                let maxHeaderTextHeight = 0;

                        2: { // Column 2: 'FOTO'
                            cellWidth: cellHeightCm * 28.3465, // Adjust width to be proportional to 3cm height + padding
                            minCellHeight: cellHeightPoints, // Ensure row height accommodates 4cm
                            halign: 'center',
                            valign: 'middle'
                        }
                    },
                    didDrawCell: function (data) {
                        if (data.section === 'body' && data.column.index === 2) { // Check column index for 'FOTO'
                            const item = items[data.row.index];

                            if (item && item.loadedImage) {
                                const img = item.loadedImage;

                                let finalImageHeightPoints = targetImageHeightCm * 28.3465;
let finalImageWidthPoints = (img.naturalWidth / img.naturalHeight) * finalImageHeightPoints;

// Garantir que largura e altura cabem dentro da célula
if (finalImageWidthPoints > data.cell.width) {
    const scaleFactor = data.cell.width / finalImageWidthPoints;
    finalImageWidthPoints *= scaleFactor;
    finalImageHeightPoints *= scaleFactor;
}
if (finalImageHeightPoints > data.cell.height) {
    const scaleFactorH = data.cell.height / finalImageHeightPoints;
    finalImageHeightPoints *= scaleFactorH;
    finalImageWidthPoints *= scaleFactorH;
}

// Centralizar a imagem na célula
const x = data.cell.x + (data.cell.width - finalImageWidthPoints) / 2;
const y = data.cell.y + (data.cell.height - finalImageHeightPoints) / 2;

doc.addImage(img.src, 'PNG', x, y, finalImageWidthPoints, finalImageHeightPoints);
                            }
                            data.cell.text = []; // Ensure no text is rendered
                        }
                    },

                            data.cell.styles.minCellHeight = cellHeightPoints;
                        }
                    }
                });

                // Update yPos after table
                return doc.autoTable.previous.finalY + 15; // Add some space after the table
            };


            // Adicionar tabela de Itens da Vistoria

            if (!contractDateInput) console.error("Element with ID 'contractDate' not found.");
            if (!brokerNameInput) console.error("Element with ID 'brokerName' not found.");
            if (!creciInput) console.error("Element with ID 'creci' not found.");
            if (!cpfInput) console.error("Element with ID 'cpf' not found.");
            if (!landlordInput) console.error("Element with ID 'landlord' not found.");
            if (!tenantInput) console.error("Element with ID 'tenant' not found.");
            if (!propertyTypeSelect) console.error("Element with ID 'propertyType' not found.");
            if (!destinationSelect) console.error("Element with ID 'destination' not found.");
            if (!propertyAddressTextarea) console.error("Element with ID 'propertyAddress' not found.");
            if (!inspectionItemDescriptionInput) console.error("Element with ID 'inspectionItemDescription' not found.");
            if (!openCameraInspectionButton) console.error("Element with ID 'openCameraInspection' not found.");
            if (!selectPhotoInspectionInput) console.error("Element with ID 'selectPhotoInspection' not found.");
            if (!triggerSelectPhotoInspectionButton) console.error("Element with ID 'triggerSelectPhotoInspection' not found.");
            if (!inspectionItemsTableBody) console.error("Element with ID 'inspectionItemsTable' tbody not found.");
            if (!noInspectionItemsRow) console.error("Element with ID 'noInspectionItems' not found.");
            if (!damageItemDescriptionInput) console.error("Element with ID 'damageItemDescription' not found.");
            if (!openCameraDamageButton) console.error("Element with ID 'openCameraDamage' not found.");
            if (!selectPhotoDamageInput) console.error("Element with ID 'selectPhotoDamage' not found.");
            if (!triggerSelectPhotoDamageButton) console.error("Element with ID 'triggerSelectPhotoDamage' not found.");
            if (!damageItemsTableBody) console.error("Element with ID 'damageItemsTable' tbody not found.");
            if (!noDamageItemsRow) console.error("Element with ID 'noDamageItems' not found.");
            if (!generatePdfButton) console.error("Element with ID 'generatePdf' not found.");
            if (!cameraModal) console.error("Element with ID 'cameraModal' not found.");
            if (!cameraFeed) console.error("Element with ID 'cameraFeed' not found.");
            if (!cameraCanvas) console.error("Element with ID 'cameraCanvas' not found.");
            if (!takePhotoButton) console.error("Element with ID 'takePhoto' not found.");
            if (!cancelCameraButton) console.error("Element with ID 'cancelCamera' not found.");
            if (!cameraModalCloseButton) console.error("Element with ID 'cameraModalClose' not found.");
            if (!cameraErrorMessage) console.error("Element with ID 'cameraErrorMessage' not found.");
            if (!messageBox) console.error("Element with ID 'messageBox' not found.");
            if (!messageText) console.error("Element with ID 'messageText' not found.");
            if (!closeMessageBoxButton) console.error("Element with ID 'closeMessageBox' not found.");
            if (!reportTypeRadios || reportTypeRadios.length === 0) console.error("Radio buttons with name 'reportType' not found.");
            if (!municipioSelect) console.error("Element with ID 'municipioSelect' not found."); // Debugging para o novo elemento
            if (!selectedMunicipioTextInput) console.error("Element with ID 'selectedMunicipioText' not found."); // Debugging para o novo elemento


            renderInspectionItems();
            renderDamageItems();

            if (cpfInput) {
                cpfInput.addEventListener('input', (e) => {
                    let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
                    if (value.length > 9) {
                        value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{2})$/, '$1.$2.$3-$4');
                    } else if (value.length > 6) {
                        value = value.replace(/^(\d{3})(\d{3})(\d{3})$/, '$1.$2.$3');
                    } else if (value.length > 3) {
                        value = value.replace(/^(\d{3})(\d{3})$/, '$1.$2');
                    }
                    e.target.value = value;
                });
            }

            // Event listener for municipio select
            if (municipioSelect && selectedMunicipioTextInput) {
                municipioSelect.addEventListener('change', () => {
                    selectedMunicipioTextInput.value = municipioSelect.value;
                });
                // Set initial value on load
                selectedMunicipioTextInput.value = municipioSelect.value;
            }


            if (openCameraInspectionButton) {
                openCameraInspectionButton.addEventListener('click', () => {
                    const description = inspectionItemDescriptionInput.value.trim();
                    if (description) {
                        openCamera('inspection', inspectionItemDescriptionInput);
                    } else {
                        showMessage('Por favor, digite uma descrição antes de abrir a câmera.');
                    }
                });
            }
            if (triggerSelectPhotoInspectionButton) {
                triggerSelectPhotoInspectionButton.addEventListener('click', () => {
                    const description = inspectionItemDescriptionInput.value.trim();
                    if (description) {
                        selectPhotoInspectionInput.click();
                    } else {
                        showMessage('Por favor, digite uma descrição antes de selecionar a foto.');
                    }
                });
            }
            if (selectPhotoInspectionInput) {
                selectPhotoInspectionInput.addEventListener('change', (e) => handleFileSelect(e, 'inspection'));
            }

            if (openCameraDamageButton) {
                openCameraDamageButton.addEventListener('click', () => {
                    const description = damageItemDescriptionInput.value.trim();
                    if (description) {
                        openCamera('damage', damageItemDescriptionInput);
                    } else {
                        showMessage('Por favor, digite uma descrição antes de abrir a câmera.');
                    }
                });
            }
            if (triggerSelectPhotoDamageButton) {
                triggerSelectPhotoDamageButton.addEventListener('click', () => {
                    const description = damageItemDescriptionInput.value.trim();
                    if (description) {
                        selectPhotoDamageInput.click();
                    } else {
                        showMessage('Por favor, digite uma descrição antes de selecionar a foto.');
                    }
                });
            }
            if (selectPhotoDamageInput) {
                selectPhotoDamageInput.addEventListener('change', (e) => handleFileSelect(e, 'damage'));
            }

            if (takePhotoButton) takePhotoButton.addEventListener('click', takePhoto);
            if (cancelCameraButton) cancelCameraButton.addEventListener('click', closeCameraModal);
            if (cameraModalCloseButton) cameraModalCloseButton.addEventListener('click', closeCameraModal);
            if (window && cameraModal) { // Fecha modal clicando fora
                window.addEventListener('click', (event) => {
                    if (event.target == cameraModal) {
                        closeCameraModal();
                    }
                });
            }
            if (generatePdfButton) generatePdfButton.addEventListener('click', generatePDF);
            if (closeMessageBoxButton) closeMessageBoxButton.addEventListener('click', closeMessageBox);
        });
    </script>
</body>
</html>
