<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo de Vistoria</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Variáveis de Cor RE/MAX */
        :root {
            --remax-blue: #003da5;
            --remax-red: #e60e16;
            --remax-light-gray: #cccccc;
            --remax-medium-gray: #bbbbbb;
            --remax-dark-gray: #aaaaaa;
        }

        /* Estilos Gerais */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--remax-light-gray);
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-grow: 1;
        }

        h1 {
            color: var(--remax-blue);
            text-align: center;
            margin-bottom: 25px;
            padding: 15px 0; /* Adicionado padding */
            border-bottom: 3px solid var(--remax-blue);
            /* Semelhante ao footer */
            background-color: #f9f9f9;
            /* Semelhante ao footer */
            border-radius: 8px 8px 0 0;
            /* Arredondar apenas os cantos superiores */
            margin-top: -30px;
            /* Ajusta para remover espaço extra do container */
            margin-left: -30px;
            /* Ajusta para preencher a largura do container */
            margin-right: -30px;
            /* Ajusta para preencher a largura do container */
            margin-bottom: 30px;
            /* Espaço abaixo do título */
        }

        h2 {
            color: var(--remax-blue);
            margin-top: 35px;
            border-bottom: 1px solid var(--remax-medium-gray);
            padding-bottom: 10px;
            text-align: center;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--remax-medium-gray);
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: #777;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--remax-blue);
            box-shadow: 0 0 5px rgba(0, 61, 165, 0.5);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Layout Específico: Estado do Imóvel */
        .form-group.estado-imovel {
            flex-direction: row;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; /* Permite quebrar linha em telas menores */
        }

        .form-group.estado-imovel label {
            margin-bottom: 0;
            flex-shrink: 0; /* Impede que o label encolha */
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 0; /* Conforme requisito */
        }

        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
            color: #555; /* Cor padrão não selecionado */
            transition: color 0.3s ease;
        }

        .radio-group input[type="radio"] {
            margin-right: 8px;
            width: auto;
        }

        .radio-group input[type="radio"]:checked + span {
            color: var(--remax-blue);
            font-weight: bold;
        }

        /* Botões */
        .button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.3s ease;
            height: 40px;
            min-height: 40px;
            font-weight: bold;
            white-space: nowrap; /* Previne quebra de linha em botões com ícone e texto */
        }
        .button.icon-only { /* Novo estilo para botões apenas com ícone */
            padding: 0;
            /* Ajustado para remover padding */
            width: 40px;
            /* Garante um tamanho fixo e quadrado */
            height: 40px;
            /* Garante um tamanho fixo e quadrado */
            gap: 0;
            /* Remove o espaçamento se não houver texto */
        }

        .button .material-icons {
            font-size: 1.5rem;
            /* Aumentado o tamanho do ícone */
        }

        .primary-button {
            background-color: var(--remax-blue);
            color: #fff;
        }

        .primary-button:hover {
            background-color: #3366bb;
        }

        .delete-button {
            background-color: var(--remax-red);
            color: #fff;
        }

        .delete-button:hover {
            background-color: #ff4d4d;
        }

        .pdf-button {
            background-color: var(--remax-red);
            color: #fff;
            margin-top: 30px;
            width: 100%;
        }

        .pdf-button:hover {
            background-color: #ff4d4d;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: flex-end; /* Alinha os botões à direita */
        }
        /* Override general .action-buttons .button styles for this specific context */
        .input-with-buttons .action-buttons .button {
            flex-grow: 0;
            /* Do not grow */
            max-width: none;
            /* Remove max-width restriction */
        }

        .action-buttons .button {
            flex-grow: 1;
            max-width: 200px;
        }

        /* Tabelas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        th, td {
            border: 1px solid var(--remax-medium-gray);
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: #f0f0f0;
            font-weight: bold;
            color: #444;
        }

        td img {
            max-width: 100px;
            max-height: 100px;
            height: auto;
            display: block;
            margin: 0 auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* Centraliza os botões de ação nas células da tabela */
        .actions-cell {
            text-align: center;
            vertical-align: middle; /* Já herdado, mas explicitando */
        }

        .no-records {
            text-align: center;
            color: #777;
            padding: 20px;
            font-style: italic;
        }

        /* Modal da Câmera */
        .camera-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            /* Full width */
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .camera-modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .camera-modal-content video {
            width: 100%;
            max-height: 400px;
            background-color: #000;
            border-radius: 5px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .camera-modal-content canvas {
            display: none;
        }

        .camera-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .camera-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .camera-modal-close:hover,
        .camera-modal-close:focus {
            color: var(--remax-red);
        }

        .camera-error-message {
            color: var(--remax-red);
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* Novo estilo para blocos de informação */
        .info-block {
            border: 1px solid var(--remax-medium-gray);
            border-radius: 8px;
            padding: 0px 20px 20px 20px;
            margin-top: 20px;
            margin-bottom: 20px;
            background-color: #fcfcfc;
        }

        .info-block h3 {
            text-align: center;
            color: var(--remax-blue);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .info-block .form-group {
            margin-bottom: 15px;
        }

        .info-block .form-group:last-child {
            margin-bottom: 0;
        }

        /* Estilos para agrupar campos lado a lado */
        .form-group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Espaçamento entre os campos */
            margin-bottom: 18px;
            /* Mantém o espaçamento entre as linhas */
        }

        .form-group-row .form-group {
            flex: 1;
            /* Permite que cada item ocupe o espaço disponível */
            min-width: 250px;
            /* Garante que os campos não fiquem muito pequenos */
            margin-bottom: 0;
            /* Remove a margem inferior padrão para flex item */
        }
        .form-group-row .form-group label { /* Centraliza os títulos dos campos dentro de form-group-row */
            text-align: center;
            width: 100%; /* Garante que o label ocupe toda a largura para centralizar o texto */
        }

        /* Divisor */
        .divider {
            height: 1px;
            background-color: var(--remax-medium-gray);
            margin: 40px 0;
        }

        /* Rodapé */
        .site-footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #777;
            font-size: 0.9rem;
            border-top: 3px solid var(--remax-blue);
            background-color: #f9f9f9;
            border-radius: 0 0 8px 8px;
        }

        /* Novo estilo para agrupar input e botões */
        .input-with-buttons {
            display: flex;
            align-items: flex-end; /* Alinha os botões com a parte inferior do input */
            gap: 10px;
            /* Espaço entre o campo de texto e os botões */
            margin-bottom: 18px;
            /* Mantém o espaçamento vertical */
        }

        .input-with-buttons .form-group {
            flex-grow: 1;
            /* Permite que o campo de texto ocupe o espaço restante */
            margin-bottom: 0;
            /* Remove a margem inferior padrão para alinhamento em flex */
        }

        .input-with-buttons .action-buttons {
            display: flex;
            gap: 5px; /* Espaço menor entre os botões de câmera e galeria */
            margin-top: 0;
            /* Remove a margem superior desnecessária */
            justify-content: flex-start;
            align-items: flex-end; /* Alinha os botões com a parte inferior */
            margin-bottom: 0;
            /* Remove a margem inferior desnecessária */
        }

        /* Estilo para os novos radio buttons */
        .radio-question {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .radio-question > label {
            margin-right: 20px;
            font-weight: bold;
            flex-basis: 100%; /* Ocupa a largura total em telas menores */
            margin-bottom: 5px;
            /* Espaço entre a pergunta e os radios */
        }
        .radio-question .radio-group {
            margin-top: 0;
            flex-grow: 1; /* Permite que o grupo de rádio ocupe o espaço restante */
            justify-content: flex-start;
            /* Alinha os radios à esquerda */
        }


        /* Responsividade */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 10px auto;
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
                margin-left: -20px;
                margin-right: -20px;
                border-radius: 8px 8px 0 0;
            }

            h2 {
                font-size: 1.4rem;
            }

            .form-group.estado-imovel,
            .form-group-row { /* Quebra em coluna em telas menores */
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .form-group-row .form-group {
                min-width: 100%;
                /* Ocupa largura total em telas menores */
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons .button {
                max-width: 100%;
            }
            .action-buttons .button.icon-only { /* Ajuste para botões apenas com ícone em telas pequenas */
                max-width: 40px;
                /* Mantém o tamanho fixo para ícones */
            }

            .input-with-buttons {
                flex-direction: column;
                /* Quebra em coluna em telas menores */
                align-items: stretch;
            }
            .input-with-buttons .action-buttons {
                justify-content: center;
                /* Centraliza os botões quando em coluna */
                margin-top: 10px;
            }

            th, td {
                padding: 8px;
                font-size: 0.9rem;
            }

            td img {
                max-width: 80px;
                max-height: 80px;
            }

            .info-block {
                padding: 15px;
            }
            .radio-question {
                flex-direction: column;
                align-items: flex-start;
            }
            .radio-question > label {
                margin-right: 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
                margin-left: -15px;
                margin-right: -15px;
                border-radius: 8px 8px 0 0;
            }
            h2 {
                font-size: 1.2rem;
            }
            .camera-modal-content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LAUDO DE VISTORIA</h1>

        <form id="inspectionForm">
            <div class="form-section">
                <div class="form-group-row">
                    <div class="form-group">
                        <label for="reportDate">Data do Laudo:</label>
                        <input type="date" id="reportDate" name="reportDate" required>
                    </div>

                    <div class="form-group">
                        <label for="contractDate">Data do Contrato:</label>
                        <input type="date" id="contractDate" name="contractDate" required>
                    </div>
                </div>

                <div class="info-block">
                    <h3>Informações do Corretor</h3>
                    <div class="form-group">
                        <label for="brokerName">Corretor(a):</label>
                        <input type="text" id="brokerName" name="brokerName" required>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="creci">CRECI:</label>
                            <input type="text" id="creci" name="creci" required>
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF:</label>
                            <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="XXX.XXX.XXX-XX" required>
                        </div>
                    </div>
                </div>

                <div class="info-block">
                    <h3>Informações do Imóvel</h3>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="landlord">Locador:</label>
                            <input type="text" id="landlord" name="landlord" required>
                        </div>
                        <div class="form-group">
                            <label for="tenant">Locatário:</label>
                            <input type="text" id="tenant" name="tenant" required>
                        </div>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="propertyType">Tipo de Imóvel:</label>
                            <select id="propertyType" name="propertyType" required>
                                <option value="">Selecione</option>
                                <option value="Casa">Casa</option>
                                <option value="Apartamento">Apartamento</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="destination">Destinação:</label>
                            <select id="destination" name="destination" required>
                                <option value="">Selecione</option>
                                <option value="Residencial">Residencial</option>
                                <option value="Comercial">Comercial</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="propertyAddress">Endereço do Imóvel:</label>
                        <textarea id="propertyAddress" name="propertyAddress" required></textarea>
                    </div>
                </div>

                <div class="form-group estado-imovel">
                    <label>Estado do Imóvel:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="propertyState" value="Novo" required> <span>Novo</span></label>
                        <label><input type="radio" name="propertyState" value="Excelente"> <span>Excelente</span></label>
                        <label><input type="radio" name="propertyState" value="Bom"> <span>Bom</span></label>
                        <label><input type="radio" name="propertyState" value="Regular"> <span>Regular</span></label>
                        <label><input type="radio" name="propertyState" value="Ruim"> <span>Ruim</span></label>
                    </div>
                </div>
            </div>

            <div class="info-block">
                <h3>Itens da Vistoria e Danos Encontrados</h3>
                <div class="form-section">
                    <h2>Itens da Vistoria.</h2>
                    <div class="input-with-buttons">
                        <div class="form-group">
                            <label for="inspectionItemDescription">Descrição do Item:</label>
                            <input type="text" id="inspectionItemDescription" placeholder="Ex: Porta da sala, parede da cozinha, etc.">
                        </div>
                        <div class="action-buttons">
                            <button type="button" class="button primary-button icon-only" id="openCameraInspection">
                                <span class="material-icons">camera_alt</span>
                            </button>
                            <input type="file" id="selectPhotoInspection" accept="image/*" style="display: none;">
                            <button type="button" class="button primary-button icon-only" id="triggerSelectPhotoInspection">
                                <span class="material-icons">collections</span>
                            </button>
                        </div>
                    </div>

                    <table id="inspectionItemsTable">
                        <thead>
                            <tr>
                                <th>ITEM</th>
                                <th>FOTO</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="noInspectionItems" class="no-records">
                                <td colspan="3">Nenhum item de vistoria adicionado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="divider"></div>

                <div class="form-section">
                    <h2>Danos Encontrados.</h2>
                    <div class="input-with-buttons">
                        <div class="form-group">
                            <label for="damageItemDescription">Descrição do Dano:</label>
                            <input type="text" id="damageItemDescription" placeholder="Ex: Vidro quebrado, pintura descascada, etc.">
                        </div>
                        <div class="action-buttons">
                            <button type="button" class="button primary-button icon-only" id="openCameraDamage">
                                <span class="material-icons">camera_alt</span>
                            </button>
                            <input type="file" id="selectPhotoDamage" accept="image/*" style="display: none;">
                            <button type="button" class="button primary-button icon-only" id="triggerSelectPhotoDamage">
                                <span class="material-icons">collections</span>
                            </button>
                        </div>
                    </div>

                    <table id="damageItemsTable">
                        <thead>
                            <tr>
                                <th>Item Danificado</th>
                                <th>Foto</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="noDamageItems" class="no-records">
                                <td colspan="3">Nenhum dano adicionado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="divider"></div>

                <div class="form-section">
                    <h2>Ambientes</h2>
                    <div class="radio-question">
                        <label>01 - Hall de entrada, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="hallEntradaDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="hallEntradaDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>02 - Hall de circulação, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="hallCirculacaoDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="hallCirculacaoDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>03 - Escadas, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="escadasDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="escadasDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>04 - Salas, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="salasDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="salasDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>05 - Quartos, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="quartosDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="quartosDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>06 - Banheiros, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="banheirosDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="banheirosDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>07 - Cozinha, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="cozinhaDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="cozinhaDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>08 - Outras dependências, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="outrasDependenciasDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="outrasDependenciasDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>
                    <div class="radio-question">
                        <label>09 - Nas dependências externas, existem danos:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="dependenciasExternasDanos" value="NÃO" required> <span>NÃO</span></label>
                            <label><input type="radio" name="dependenciasExternasDanos" value="SIM"> <span>SIM.</span></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="outrosDanosDescricao">Obs. finais.</label>
                        <textarea id="outrosDanosDescricao" placeholder="Descreva os outros danos aqui..."></textarea>

    <div id="cameraModal" class="camera-modal">
        <div class="camera-modal-content">
            <span class="camera-modal-close">&times;</span>
            <video id="cameraFeed" autoplay playsinline></video>
            <canvas id="cameraCanvas" style="display: none;"></canvas>
            <div class="camera-modal-buttons">
                <button type="button" class="button primary-button" id="takePhoto">Tirar Foto</button>
                <button type="button" class="button delete-button" id="cancelCamera">Cancelar</button>
            </div>
            <p id="cameraErrorMessage" class="camera-error-message" style="display: none;"></p>
        </div>
    </div>

    <footer class="site-footer">
        </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    <script>
        // Elementos do Formulário
        const reportDateInput = document.getElementById('reportDate');
        const contractDateInput = document.getElementById('contractDate');
        const brokerNameInput = document.getElementById('brokerName');
        const creciInput = document.getElementById('creci');
        const cpfInput = document.getElementById('cpf');
        const landlordInput = document.getElementById('landlord');
        const tenantInput = document.getElementById('tenant');
        const propertyTypeSelect = document.getElementById('propertyType');
        const destinationSelect = document.getElementById('destination');
        const propertyAddressTextarea = document.getElementById('propertyAddress');

        // Itens de Vistoria
        const inspectionItemDescriptionInput = document.getElementById('inspectionItemDescription');
        const openCameraInspectionButton = document.getElementById('openCameraInspection');
        const triggerSelectPhotoInspectionButton = document.getElementById('triggerSelectPhotoInspection');
        const selectPhotoInspectionInput = document.getElementById('selectPhotoInspection');
        const inspectionItemsTableBody = document.querySelector('#inspectionItemsTable tbody');
        const noInspectionItemsRow = document.getElementById('noInspectionItems');

        // Danos Encontrados
        const damageItemDescriptionInput = document.getElementById('damageItemDescription');
        const openCameraDamageButton = document.getElementById('openCameraDamage');
        const triggerSelectPhotoDamageButton = document.getElementById('triggerSelectPhotoDamage');
        const selectPhotoDamageInput = document.getElementById('selectPhotoDamage');
        const damageItemsTableBody = document.querySelector('#damageItemsTable tbody');
        const noDamageItemsRow = document.getElementById('noDamageItems');

        const generatePdfButton = document.getElementById('generatePdfButton');

        // Elementos do Modal da Câmera
        const cameraModal = document.getElementById('cameraModal');
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const takePhotoButton = document.getElementById('takePhoto');
        const cancelCameraButton = document.getElementById('cancelCamera');
        const cameraModalCloseButton = document.querySelector('.camera-modal-close');
        const cameraErrorMessage = document.getElementById('cameraErrorMessage');

        let currentStream; // Para controlar o stream da câmera
        let currentItemType = ''; // 'inspection' ou 'damage' para saber qual tabela atualizar

        // Arrays para armazenar os itens de vistoria e danos
        let inspectionItems = [];
        let damageItems = [];

        /**
         * Preenche a data do laudo com a data atual.
         */
        function setReportDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            reportDateInput.value = `${year}-${month}-${day}`;
        }

        /**
         * Formata o CPF enquanto o usuário digita.
         * @param {Event} event - O evento de input.
         */
        function formatCPF(event) {
            let value = event.target.value.replace(/\D/g, ''); // Remove tudo que não é dígito
            if (value.length > 9) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else if (value.length > 6) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3');
            } else if (value.length > 3) {
                value = value.replace(/(\d{3})(\d{3})/, '$1.$2');
            }
            event.target.value = value;
        }

        cpfInput.addEventListener('input', formatCPF);

        /**
         * Adiciona um novo item (vistoria ou dano) à tabela correspondente.
         * @param {string} type - O tipo de item ('inspection' ou 'damage').
         * @param {string} description - A descrição do item.
         * @param {string} image - A imagem base64 do item, se houver.
         */
        function addItemToTable(type, description, image) {
            let dataArray, tableBody, noRecordsRow;
            if (type === 'inspection') {
                dataArray = inspectionItems;
                tableBody = inspectionItemsTableBody;
                noRecordsRow = noInspectionItemsRow;
            } else {
                dataArray = damageItems;
                tableBody = damageItemsTableBody;
                noRecordsRow = noDamageItemsRow;
            }

            // Remove a linha "Nenhum registro" se for o primeiro item
            if (dataArray.length === 0 && noRecordsRow) {
                noRecordsRow.style.display = 'none';
            }

            const newItem = {
                id: Date.now(), // ID único para o item
                description,
                image
            };
            dataArray.push(newItem);

            const newRow = tableBody.insertRow();
            newRow.setAttribute('data-id', newItem.id); // Adiciona um atributo de dados para fácil remoção

            const descriptionCell = newRow.insertCell(0);
            descriptionCell.textContent = newItem.description;

            const photoCell = newRow.insertCell(1);
            if (newItem.image) {
                const img = document.createElement('img');
                img.src = newItem.image;
                img.alt = `Foto de ${newItem.description}`;
                photoCell.appendChild(img);
            } else {
                photoCell.textContent = 'Sem foto';
            }
            photoCell.classList.add('actions-cell'); // Centraliza o conteúdo da célula de foto

            const actionsCell = newRow.insertCell(2);
            actionsCell.classList.add('actions-cell');
            const deleteButton = document.createElement('button');
            deleteButton.type = 'button';
            deleteButton.classList.add('button', 'delete-button', 'icon-only');
            deleteButton.innerHTML = '<span class="material-icons">delete</span>';
            deleteButton.title = `Remover ${newItem.description}`;
            deleteButton.onclick = () => removeItem(type, newItem.id);
            actionsCell.appendChild(deleteButton);

            // Limpa o campo de texto
            if (type === 'inspection') {
                inspectionItemDescriptionInput.value = '';
            } else {
                damageItemDescriptionInput.value = '';
            }
        }

        /**
         * Remove um item da tabela e do array de dados.
         * @param {string} type - 'inspection' ou 'damage'.
         * @param {number} id - O ID do item a ser removido.
         */
        function removeItem(type, id) {
            let dataArray, tableBody, noRecordsRow;
            if (type === 'inspection') {
                dataArray = inspectionItems;
                tableBody = inspectionItemsTableBody;
                noRecordsRow = noInspectionItemsRow;
            } else {
                dataArray = damageItems;
                tableBody = damageItemsTableBody;
                noRecordsRow = noDamageItemsRow;
            }

            const index = dataArray.findIndex(item => item.id === id);
            if (index > -1) {
                dataArray.splice(index, 1);
                // Remove a linha da tabela
                const rowToRemove = tableBody.querySelector(`tr[data-id="${id}"]`);
                if (rowToRemove) {
                    tableBody.removeChild(rowToRemove);
                }
            }

            // Mostra a linha "Nenhum registro" se não houver mais itens
            if (dataArray.length === 0) {
                if (noRecordsRow) {
                    noRecordsRow.style.display = 'table-row';
                }
            }
        }

        /**
         * Abre o modal da câmera e inicia a transmissão.
         * @param {string} itemType - 'inspection' ou 'damage' para saber qual input associar.
         */
        async function openCamera(itemType) {
            currentItemType = itemType;
            cameraErrorMessage.style.display = 'none'; // Esconde mensagens de erro anteriores
            try {
                // Preferir câmera traseira em mobile, ou a padrão se não houver opção
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                let constraints = { video: true }; // Padrão
                if (videoDevices.length > 1) {
                    // Tentar encontrar uma câmera traseira
                    const rearCamera = videoDevices.find(device =>
                        device.label.toLowerCase().includes('back') ||
                        device.label.toLowerCase().includes('traseira')
                    );
                    if (rearCamera) {
                        constraints = { video: { deviceId: rearCamera.deviceId } };
                    } else {
                        // Se não encontrar traseira, usar a última (geralmente é a traseira em alguns Androids)
                        constraints = { video: { deviceId: videoDevices[videoDevices.length - 1].deviceId } };
                    }
                }

                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraFeed.srcObject = currentStream;
                cameraModal.style.display = 'flex';
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                // Tenta com câmera frontal se a traseira falhar ou não for encontrada
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    cameraFeed.srcObject = currentStream;
                    cameraModal.style.display = 'flex';
                } catch (frontErr) {
                    console.error("Erro ao acessar câmera frontal: ", frontErr);
                    cameraErrorMessage.textContent = 'Não foi possível acessar nenhuma câmera. Verifique suas permissões.';
                    cameraErrorMessage.style.display = 'block';
                }
            }
        }

        /**
         * Fecha o modal da câmera e para a transmissão.
         */
        function closeCameraModal() {
            cameraModal.style.display = 'none';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        /**
         * Tira a foto do stream da câmera e adiciona como item.
         */
        function takePhoto() {
            const context = cameraCanvas.getContext('2d');
            cameraCanvas.width = cameraFeed.videoWidth;
            cameraCanvas.height = cameraFeed.videoHeight;
            context.drawImage(cameraFeed, 0, 0, cameraCanvas.width, cameraCanvas.height);
            const imageData = cameraCanvas.toDataURL('image/png');

            const descriptionInput = currentItemType === 'inspection' ? inspectionItemDescriptionInput : damageItemDescriptionInput;
            const description = descriptionInput.value.trim();

            if (description) {
                addItemToTable(currentItemType, description, imageData);
                closeCameraModal();
            } else {
                alert('Por favor, adicione uma descrição antes de tirar a foto.');
            }
        }

        /**
         * Lida com a seleção de arquivo de imagem.
         * @param {Event} event - O evento de mudança do input file.
         * @param {string} itemType - 'inspection' ou 'damage'.
         */
        function handleFileSelect(event, itemType) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imageData = e.target.result;
                    const descriptionInput = itemType === 'inspection' ? inspectionItemDescriptionInput : damageItemDescriptionInput;
                    const description = descriptionInput.value.trim();

                    if (description) {
                        addItemToTable(itemType, description, imageData);
                    } else {
                        alert('Por favor, digite uma descrição antes de selecionar a foto.');
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        /**
         * Coleta os valores dos novos radio buttons de dano.
         * @returns {Object} Um objeto com o nome do campo e o valor selecionado.
         */
        function getDamageRadioValues() {
            const damageRadioFields = [
                "hallEntradaDanos", "hallCirculacaoDanos", "escadasDanos", "salasDanos",
                "quartosDanos", "banheirosDanos", "cozinhaDanos", "outrasDependenciasDanos",
                "dependenciasExternasDanos"
            ];
            const values = {};
            damageRadioFields.forEach(name => {
                const checkedRadio = document.querySelector(`input[name="${name}"]:checked`);
                values[name] = checkedRadio ? checkedRadio.value : 'Não informado';
            });
            return values;
        }

        /**
         * Adiciona o rodapé a cada página do PDF.
         * @param {object} doc - Instância do jsPDF.
         * @param {number} pageNumber - Número da página atual.
         * @param {number} totalPages - Número total de páginas.
         */
        const addPdfFooter = (doc, pageNumber, totalPages) => {
            const margin = 15; // Margem padrão
            const pageHeight = doc.internal.pageSize.height;
            const pageSize = doc.internal.pageSize;
            const pageWidth = pageSize.width ? pageSize.width : pageSize.getWidth();
            const footerY = pageHeight - 15; // Posição Y do rodapé
            
            // Page X of Y
            doc.setFontSize(10);
            doc.setTextColor(119, 119, 119); // Cinza do rodapé
            doc.setFont('Arial', 'Normal'); // Ensure Arial for footer
            doc.text(`Página ${pageNumber} de ${totalPages}`, pageWidth - margin, footerY, { align: 'right' });

            // Developer info (centralizado)
            doc.text("Desenvolvido por Peter Lange", pageWidth / 2, footerY, { align: 'center' });
        };

        /**
         * Gera o documento PDF com base nos dados do formulário e tabelas.
         */
        async function generatePDF() {
            const { jsPDF } = window; // Changed this line
            const doc = new jsPDF('p', 'mm', 'A4'); // 'p' for portrait, 'mm' for millimeters, 'A4' size

            const margin = 15;
            let y = margin;
            const lineHeight = 7; // Espaçamento entre as linhas
            const imageMaxHeight = 30; // Altura máxima para imagens na tabela

            // Contar total de páginas para o rodapé (estimativa inicial)
            // Isso é complicado com jsPDF-autotable, geralmente fazemos uma passagem dupla
            // ou atualizamos o rodapé no final. Por simplicidade, vamos deixar 'totalPages'
            // ser undefined ou um placeholder e focar no restante.
            // Para total de páginas preciso de um hook didParseCell ou didDrawPage que jsPDF-autotable oferece.

            // Adicionar fontes para o jsPDF (exemplo, você pode precisar carregar mais)
            // jsPDF vem com 'helvetica', 'times', 'courier' por padrão.
            // Para 'Roboto', pode ser necessário incluir um pacote de fontes ou convertê-la.
            // Por simplicidade, usaremos Arial que é um fallback comum ou as fontes padrão.
            doc.setFont('Arial', 'Normal');

            // Título do Laudo
            doc.setFontSize(22);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            doc.text("LAUDO DE VISTORIA", doc.internal.pageSize.width / 2, y, { align: 'center' });
            y += 15;

            // Informações do Laudo e Contrato
            doc.setFontSize(12);
            doc.setTextColor(51, 51, 51);
            const reportDate = reportDateInput.value;
            const contractDate = contractDateInput.value;

            // Formatar datas para exibição no PDF
            const formattedReportDate = reportDate ? new Date(reportDate).toLocaleDateString('pt-BR') : 'Não informada';
            const formattedContractDate = contractDate ? new Date(contractDate).toLocaleDateString('pt-BR') : 'Não informada';

            // Coletar dados do formulário
            const brokerName = brokerNameInput.value || 'Não informado';
            const creci = creciInput.value || 'Não informado';
            const cpf = cpfInput.value || 'Não informado';
            const landlord = landlordInput.value || 'Não informado';
            const tenant = tenantInput.value || 'Não informado';
            const propertyType = propertyTypeSelect.value || 'Não informado';
            const destination = destinationSelect.value || 'Não informado';
            const propertyAddress = propertyAddressTextarea.value || 'Não informado';
            const propertyState = document.querySelector('input[name="propertyState"]:checked')?.value || 'Não informado';


            // Título e dados de Informações do Corretor
            doc.setFontSize(16);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            if (y + 10 > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
            doc.text("Informações do Corretor", margin, y);
            y += 10;
            doc.setFontSize(11);
            doc.setTextColor(51, 51, 51); // Cor principal do texto
            doc.text(`Corretor(a): ${brokerName}`, margin, y);
            y += lineHeight;
            doc.text(`CRECI: ${creci}`, margin, y);
            y += lineHeight;
            doc.text(`CPF: ${cpf}`, margin, y);
            y += 10; // Espaço após o bloco

            // Título e dados de Informações do Imóvel
            doc.setFontSize(16);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            if (y + 10 > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
            doc.text("Informações do Imóvel", margin, y);
            y += 10;
            doc.setFontSize(11);
            doc.setTextColor(51, 51, 51); // Cor principal do texto

            // Montar texto do imóvel com formatação de negrito
            const textParts = [
                { text: `Imóvel do tipo `, bold: false },
                { text: propertyType, bold: true },
                { text: ", com destinação ", bold: false },
                { text: destination, bold: true },
                { text: " situado no(a) ", bold: false },
                { text: propertyAddress, bold: true },
                { text: ", de propriedade do(a) Sr.(a) ", bold: false },
                { text: landlord, bold: true },
                { text: " e locado para o(a) Sr(a). ", bold: false },
                { text: tenant, bold: true },
                { text: ".", bold: false }
            ];

            doc.setFontSize(11);
            doc.setTextColor(51, 51, 51);
            const textWidth = doc.internal.pageSize.width - 2 * margin;
            y += 5; // Pequeno espaço após o título

            let currentLine = '';
            for (const part of textParts) {
                doc.setFont('Arial', part.bold ? 'Bold' : 'Normal');
                const testLine = currentLine + part.text;
                const testWidth = doc.getTextWidth(testLine);

                if (testWidth > textWidth && currentLine !== '') {
                    doc.text(currentLine, margin, y);
                    y += lineHeight;
                    currentLine = part.text;
                } else {
                    currentLine += part.text;
                }
            }
            doc.text(currentLine, margin, y);
            y += lineHeight;
            y += 10; // Espaço após o bloco de informações


            // Estado do Imóvel
            doc.setFontSize(12);
            // Volta ao tamanho de fonte padrão
            doc.setFont('Arial', 'Normal'); // Reset font to normal for this line
            doc.text(`Estado do Imóvel: ${propertyState}`, margin, y);
            y += lineHeight;
            y += 15;

            // Seção Itens da Vistoria
            if (y + 10 > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
            doc.setFontSize(16);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            doc.text("Itens da Vistoria", margin, y);
            y += 10;

            const inspectionTableData = inspectionItems.map(item => [item.description, '', '']); // 'Imagem' será preenchido no didDrawCell

            doc.autoTable({
                startY: y,
                head: [['ITEM', 'FOTO', 'AÇÕES']],
                body: inspectionTableData,
                margin: { left: margin, right: margin },
                styles: {
                    font: 'Arial',
                    fontSize: 10,
                    cellPadding: 3,
                    valign: 'middle',
                    halign: 'left'
                },
                headStyles: {
                    fillColor: [240, 240, 240], // Cor de fundo do cabeçalho
                    textColor: [68, 68, 68],
                    fontStyle: 'bold',
                    halign: 'center' // Centraliza o texto do cabeçalho horizontalmente
                },
                columnStyles: {
                    1: { // Target the 'FOTO' column (index 1)
                        cellWidth: 40, // 40mm wide
                        minCellHeight: imageMaxHeight + 5 // Ensure minimum height to fit image with padding (30mm image + 5mm padding)
                    }
                },
                didDrawCell: function (data) {
                    if (data.column.index === 1 && data.cell.section === 'body') {
                        const item = inspectionItems[data.row.index];
                        if (item && item.image) {
                            try {
                                // Redimensionar imagem para caber na célula
                                let img = new Image();
                                img.src = item.image;
                                const aspectRatio = img.width / img.height;
                                let finalImgWidth = data.cell.width - 2; // Subtract padding
                                let finalImgHeight = finalImgWidth / aspectRatio;

                                if (finalImgHeight > imageMaxHeight) {
                                    finalImgHeight = imageMaxHeight;
                                    finalImgWidth = finalImgHeight * aspectRatio;
                                }

                                const imgX = data.cell.x + (data.cell.width / 2) - (finalImgWidth / 2);
                                const imgY = data.cell.y + (data.cell.height / 2) - (finalImgHeight / 2);
                                doc.addImage(item.image, 'PNG', imgX, imgY, finalImgWidth, finalImgHeight);
                            } catch (e) {
                                console.error("Erro ao adicionar imagem de vistoria ao PDF:", e);
                                doc.text("Erro na Imagem", data.cell.x + 2, data.cell.y + (data.cell.height / 2));
                            }
                        }
                    }
                },
                didParseCell: function (data) {
                    if (data.column.index === 1 && data.cell.section === 'body') {
                        data.cell.content = ''; // Clear text content for image cell
                    }
                },
                didDrawPage: function (data) {
                    addPdfFooter(doc, data.pageNumber, doc.internal.getNumberOfPages());
                }
            });

            y = doc.autoTable.previous.finalY + 15; // Posição Y após a tabela de vistoria

            // Seção Danos Encontrados
            if (y + 10 > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
            doc.setFontSize(16);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            doc.text("Danos Encontrados", margin, y);
            y += 10;

            const damageTableData = damageItems.map(item => [item.description, '', '']); // 'Imagem' será preenchido no didDrawCell

            doc.autoTable({
                startY: y,
                head: [['ITEM DANIFICADO', 'FOTO', 'AÇÕES']],
                body: damageTableData,
                margin: { left: margin, right: margin },
                styles: {
                    font: 'Arial',
                    fontSize: 10,
                    cellPadding: 3,
                    valign: 'middle',
                    halign: 'left'
                },
                headStyles: {
                    fillColor: [240, 240, 240],
                    textColor: [68, 68, 68],
                    fontStyle: 'bold',
                    halign: 'center' // Centraliza o texto do cabeçalho horizontalmente
                },
                columnStyles: {
                    1: { // Target the 'FOTO' column (index 1)
                        cellWidth: 40, // 40mm wide
                        minCellHeight: imageMaxHeight + 5 // Ensure minimum height to fit image with padding
                    }
                },
                didDrawCell: function (data) {
                    if (data.column.index === 1 && data.cell.section === 'body') {
                        const item = damageItems[data.row.index];
                        if (item && item.image) {
                            try {
                                let img = new Image();
                                img.src = item.image;
                                const aspectRatio = img.width / img.height;
                                let finalImgWidth = data.cell.width - 2; // Subtract padding
                                let finalImgHeight = finalImgWidth / aspectRatio;

                                if (finalImgHeight > imageMaxHeight) {
                                    finalImgHeight = imageMaxHeight;
                                    finalImgWidth = finalImgHeight * aspectRatio;
                                }

                                const imgX = data.cell.x + (data.cell.width / 2) - (finalImgWidth / 2);
                                const imgY = data.cell.y + (data.cell.height / 2) - (finalImgHeight / 2);
                                doc.addImage(item.image, 'PNG', imgX, imgY, finalImgWidth, finalImgHeight);
                            } catch (e) {
                                console.error("Erro ao adicionar imagem de dano ao PDF:", e);
                                doc.text("Erro na Imagem", data.cell.x + 2, data.cell.y + (data.cell.height / 2));
                            }
                        }
                    }
                },
                didParseCell: function (data) {
                    if (data.column.index === 1 && data.cell.section === 'body') {
                        data.cell.content = ''; // Clear text content for image cell
                    }
                },
                didDrawPage: function (data) {
                    addPdfFooter(doc, data.pageNumber, doc.internal.getNumberOfPages());
                }
            });

            y = doc.autoTable.previous.finalY + 15; // Posição Y após a tabela de danos

            // Coletar valores dos rádios de ambientes
            const damageRadioValues = getDamageRadioValues();
            const damageQuestions = [
                { label: "01 - Hall de entrada, existem danos:", name: "hallEntradaDanos" },
                { label: "02 - Hall de circulação, existem danos:", name: "hallCirculacaoDanos" },
                { label: "03 - Escadas, existem danos:", name: "escadasDanos" },
                { label: "04 - Salas, existem danos:", name: "salasDanos" },
                { label: "05 - Quartos, existem danos:", name: "quartosDanos" },
                { label: "06 - Banheiros, existem danos:", name: "banheirosDanos" },
                { label: "07 - Cozinha, existem danos:", name: "cozinhaDanos" },
                { label: "08 - Outras dependências, existem danos:", name: "outrasDependenciasDanos" },
                { label: "09 - Nas dependências externas, existem danos:", name: "dependenciasExternasDanos" }
            ];

            if (y + 10 > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
            doc.setFontSize(16);
            doc.setTextColor(0, 61, 165); // Azul RE/MAX
            doc.text("Ambientes", margin, y);
            y += 10;
            doc.setFontSize(11);
            doc.setTextColor(51, 51, 51); // Cor principal do texto

            damageQuestions.forEach(q => {
                const questionText = q.label;
                const answerText = damageRadioValues[q.name];

                // Verifica se o texto vai caber na página, adiciona nova página se necessário
                if (y + lineHeight > doc.internal.pageSize.height - margin) {
                    doc.addPage();
                    y = margin;
                }
                doc.setFont('Arial', 'Normal');
                doc.text(questionText, margin, y);
                doc.setFont('Arial', 'Bold');
                doc.text(answerText, margin + doc.getTextWidth(questionText) + 2, y); // Ajuste de 2mm para espaçamento
                y += lineHeight;
            });
            y += 10;

            // Outros Danos Descrição (agora "Obs. finais")
            const outrosDanosDescricao = document.getElementById('outrosDanosDescricao').value.trim();
            if (outrosDanosDescricao) {
                if (y + lineHeight > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
                doc.setFontSize(12);
                doc.setFont('Arial', 'Bold');
                doc.text("Obs. finais:", margin, y);
                doc.setFont('Arial', 'Normal');
                y += lineHeight;
                const textLines = doc.splitTextToSize(outrosDanosDescricao, doc.internal.pageSize.width - 2 * margin);
                textLines.forEach(line => {
                    if (y + lineHeight > doc.internal.pageSize.height - margin) { doc.addPage(); y = margin; }
                    doc.text(line, margin, y);
                    y += lineHeight;
                });
                y += 10;
            }


            // Finalize o PDF e salve
            doc.save('laudo_vistoria_REMAX.pdf');
        }


        // Inicialização
        setReportDate(); // Preenche a data do laudo ao carregar a página

        // Event Listeners
        openCameraInspectionButton.addEventListener('click', () => {
            const description = inspectionItemDescriptionInput.value.trim();
            if (description) {
                openCamera('inspection');
            } else {
                alert('Por favor, digite uma descrição antes de abrir a câmera.');
            }
        });
        triggerSelectPhotoInspectionButton.addEventListener('click', () => {
            const description = inspectionItemDescriptionInput.value.trim();
            if (description) {
                selectPhotoInspectionInput.click();
            } else {
                alert('Por favor, digite uma descrição antes de selecionar a foto.');
            }
        });
        selectPhotoInspectionInput.addEventListener('change', (e) => handleFileSelect(e, 'inspection'));

        openCameraDamageButton.addEventListener('click', () => {
            const description = damageItemDescriptionInput.value.trim();
            if (description) {
                openCamera('damage');
            } else {
                alert('Por favor, digite uma descrição antes de abrir a câmera.');
            }
        });
        triggerSelectPhotoDamageButton.addEventListener('click', () => {
            const description = damageItemDescriptionInput.value.trim();
            if (description) {
                selectPhotoDamageInput.click();
            } else {
                alert('Por favor, digite uma descrição antes de selecionar a foto.');
            }
        });
        selectPhotoDamageInput.addEventListener('change', (e) => handleFileSelect(e, 'damage'));

        takePhotoButton.addEventListener('click', takePhoto);
        cancelCameraButton.addEventListener('click', closeCameraModal);
        cameraModalCloseButton.addEventListener('click', closeCameraModal);
        window.addEventListener('click', (event) => { // Fecha modal clicando fora
            if (event.target == cameraModal) {
                closeCameraModal();
            }
        });
        generatePdfButton.addEventListener('click', generatePDF);
    </script>
</body>
