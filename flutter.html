<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laudo de Vistoria - Remax Litorânea</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1, h2 {
            text-align: center;
            color: #0056b3;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-row > div {
            flex: 1;
            min-width: 200px; /* Garante que os divs tenham um mínimo de largura */
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
        }
        .radio-group input[type="radio"] {
            margin-right: 5px;
            width: auto; /* Sobrescreve o 100% de largura para radio buttons */
        }
        
        /* Ajustes para os campos de item e botão */
        .item-input-group {
            display: flex;
            align-items: flex-end; /* Alinha o botão com a base do input */
            gap: 10px; /* Espaço entre o input e o botão */
            flex-grow: 1; /* Permite que este grupo ocupe o espaço disponível */
            flex-wrap: wrap; /* Permite que o botão quebre a linha em telas pequenas */
        }

        .item-input-group > div {
            flex: 1; /* O div do input vai crescer */
            min-width: 150px; /* Um mínimo para o input */
        }

        .item-input-group input[type="text"] {
            width: 100%; /* Garante que o input preencha seu contêiner */
        }

        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap; /* Evita que o texto do botão quebre */
        }
        button:hover {
            background-color: #0056b3;
        }
        .icon {
            font-family: 'Material Icons';
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .delete-button {
            background-color: #dc3545;
        }
        .delete-button:hover {
            background-color: #c82333;
        }
        .pdf-button {
            background-color: #28a745;
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
        .pdf-button:hover {
            background-color: #218838;
        }
        .divider {
            border-top: 1px solid #eee;
            margin: 30px 0;
        }
        img {
            max-width: 100%;
            height: 3cm; /* Altura fixa para exibição na tabela */
            object-fit: contain; /* Garante que a imagem se ajuste sem distorção */
        }

        /* Estilos para o Modal da Câmera */
        .modal {
            display: none; /* Escondido por padrão */
            position: fixed; /* Fica por cima de tudo */
            z-index: 1000; /* Alto z-index */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto; /* Habilita scroll se necessário */
            background-color: rgba(0,0,0,0.8); /* Fundo escuro semi-transparente */
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
            border-radius: 8px;
            text-align: center;
            position: relative;
        }
        .modal-content video {
            width: 100%;
            max-width: 560px;
            height: auto;
            border: 1px solid #ccc;
            background-color: #000; /* Fundo preto para a pré-visualização */
        }
        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .close-button {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
        }
        .close-button:hover,
        .close-button:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>LAUDO DE VISTORIA</h1>

        <div class="form-row">
            <div>
                <label for="DataLaudo">Data do Laudo:</label>
                <input type="date" id="DataLaudo">
            </div>
            <div>
                <label for="TipoImovel">Tipo de Imóvel:</label>
                <select id="TipoImovel">
                    <option value="CASA">CASA</option>
                    <option value="APARTAMENTO">APARTAMENTO</option>
                </select>
            </div>
            <div>
                <label for="Destinacao">Destinação:</label>
                <select id="Destinacao">
                    <option value="residencial">Residencial</option>
                    <option value="comercial">Comercial</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="DataContrato">Data do Contrato:</label>
            <input type="date" id="DataContrato">
        </div>

        <div class="form-row">
            <div>
                <label for="Corretor">Corretor(a):</label>
                <input type="text" id="Corretor" placeholder="Corretor(a)">
            </div>
            <div>
                <label for="Creci">CRECI:</label>
                <input type="text" id="Creci" placeholder="CRECI">
            </div>
            <div>
                <label for="Cpf">CPF:</label>
                <input type="text" id="Cpf" placeholder="CPF">
            </div>
        </div>

        <div class="form-row">
            <div>
                <label for="NomeLocador">Locador:</label>
                <input type="text" id="NomeLocador" placeholder="Locador">
            </div>
            <div>
                <label for="NomeLocatario">Locatário:</label>
                <input type="text" id="NomeLocatario" placeholder="Locatário">
            </div>
        </div>

        <div class="form-group">
            <label for="Endereco">Endereço:</label>
            <textarea id="Endereco" placeholder="Endereço"></textarea>
        </div>

        <div class="form-group">
            <label>Estado do Imóvel:</label>
            <div class="radio-group">
                <label><input type="radio" name="estadoImovel" value="Novo"> Novo</label>
                <label><input type="radio" name="estadoImovel" value="Excelente"> Excelente</label>
                <label><input type="radio" name="estadoImovel" value="Bom"> Bom</label>
                <label><input type="radio" name="estadoImovel" value="Regular"> Regular</label>
                <label><input type="radio" name="estadoImovel" value="Ruim"> Ruim</label>
            </div>
        </div>

        <div class="divider"></div>

        <h2>Itens da Vistoria.</h2>
        <div class="item-input-group">
            <div>
                <label for="ItemVistoria">Descreva o Item:</label>
                <input type="text" id="ItemVistoria" placeholder="Descreva o Item">
            </div>
            <button id="FotoItem">
                <span class="material-icons">camera_alt</span> Foto
            </button>
        </div>

        <table id="ItensVistoria">
            <thead>
                <tr>
                    <th>ITEM</th>
                    <th>FOTO</th>
                    <th>Excluir</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="divider"></div>

        <h2 style="text-align: center;">Danos Encontrados.</h2>

        <table id="ItensDanificados">
            <thead>
                <tr>
                    <th>Item Danificado</th>
                    <th>Foto</th>
                    <th>Excluir</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="item-input-group">
            <div>
                <label for="ItemDanificado">Descreva o dano encontrado:</label>
                <input type="text" id="ItemDanificado" placeholder="Descreva o dano encontrado">
            </div>
            <button id="FotoDano">
                <span class="material-icons">camera_alt</span> Danos
            </button>
        </div>

        <button id="GerarPDF" class="pdf-button">
            <span class="material-icons">picture_as_pdf</span> Gerar PDF
        </button>
    </div>

    <div id="cameraModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModal">&times;</span>
            <h2>Pré-visualização da Câmera</h2>
            <video id="cameraPreview" autoplay playsinline></video>
            <div class="modal-buttons">
                <button id="takePhotoBtn" class="pdf-button">Tirar Foto</button>
                <button id="cancelPhotoBtn" class="delete-button">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Preenche a data atual no campo "DataLaudo"
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months start at 0!
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('DataLaudo').value = `${yyyy}-${mm}-${dd}`;
        });

        const itensVistoria = []; // Stores { text: string, photo: string (base64) }
        const itensDanificados = []; // Stores { text: string, photo: string (base64) }

        let currentStream; // Para armazenar o stream da câmera
        let currentTargetTableId; // Qual tabela vai receber o item
        let currentTargetInputId; // Qual input de texto foi usado

        // Referências do Modal
        const cameraModal = document.getElementById('cameraModal');
        const cameraPreview = document.getElementById('cameraPreview');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const cancelPhotoBtn = document.getElementById('cancelPhotoBtn');
        const closeModalBtn = document.getElementById('closeModal');

        // Helper function to add a row to a table
        function addRowToTable(tableId, itemText, photoBase64, dataArray) {
            const tableBody = document.querySelector(`#${tableId} tbody`);
            const newRow = tableBody.insertRow();

            const itemCell = newRow.insertCell(0);
            itemCell.textContent = itemText;

            const photoCell = newRow.insertCell(1);
            if (photoBase64) {
                const img = document.createElement('img');
                img.src = photoBase64;
                img.alt = 'Foto do item';
                photoCell.appendChild(img);
            } else {
                photoCell.textContent = 'N/A';
            }

            const deleteCell = newRow.insertCell(2);
            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-button';
            deleteButton.innerHTML = '<span class="material-icons">delete</span>';
            deleteButton.onclick = function() {
                const rowIndex = Array.from(tableBody.children).indexOf(newRow);
                dataArray.splice(rowIndex, 1); // Remove item from array
                tableBody.removeChild(newRow); // Remove row from DOM
            };
            deleteCell.appendChild(deleteButton);

            // Add to the respective data array
            dataArray.push({ text: itemText, photo: photoBase64 });
        }

        // Função para iniciar a pré-visualização da câmera no modal
        async function startCameraPreview(tableId, inputId) {
            const itemText = document.getElementById(inputId).value;
            if (!itemText) {
                alert('Por favor, descreva o item antes de tirar a foto.');
                return;
            }

            currentTargetTableId = tableId;
            currentTargetInputId = inputId;
            cameraModal.style.display = 'flex'; // Exibe o modal

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
                cameraPreview.srcObject = currentStream;
            } catch (err) {
                console.error('Erro ao acessar a câmera:', err);
                alert('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
                cameraModal.style.display = 'none'; // Esconde o modal
                stopCameraStream();
            }
        }

        // Função para parar o stream da câmera
        function stopCameraStream() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            cameraPreview.srcObject = null;
        }

        // Evento para Tirar Foto
        takePhotoBtn.addEventListener('click', () => {
            const itemText = document.getElementById(currentTargetInputId).value;
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            canvas.width = cameraPreview.videoWidth;
            canvas.height = cameraPreview.videoHeight;
            context.drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);

            const photoBase64 = canvas.toDataURL('image/jpeg');

            const dataArray = (currentTargetTableId === 'ItensVistoria') ? itensVistoria : itensDanificados;
            addRowToTable(currentTargetTableId, itemText, photoBase64, dataArray);

            // Limpar o campo de texto
            document.getElementById(currentTargetInputId).value = '';
            
            cameraModal.style.display = 'none'; // Esconde o modal
            stopCameraStream(); // Para o stream da câmera
        });

        // Evento para Cancelar Foto
        cancelPhotoBtn.addEventListener('click', () => {
            cameraModal.style.display = 'none'; // Esconde o modal
            stopCameraStream(); // Para o stream da câmera
        });

        // Evento para fechar o modal pelo botão "x"
        closeModalBtn.addEventListener('click', () => {
            cameraModal.style.display = 'none'; // Esconde o modal
            stopCameraStream(); // Para o stream da câmera
        });


        // Event Listeners para Abrir o Modal da Câmera
        document.getElementById('FotoItem').addEventListener('click', () => {
            startCameraPreview('ItensVistoria', 'ItemVistoria');
        });

        document.getElementById('FotoDano').addEventListener('click', () => {
            startCameraPreview('ItensDanificados', 'ItemDanificado');
        });

        // PDF Generation
        document.getElementById('GerarPDF').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Collect form data
            const dataLaudo = document.getElementById('DataLaudo').value;
            const tipoImovel = document.getElementById('TipoImovel').value;
            const destinacao = document.getElementById('Destinacao').value;
            const dataContrato = document.getElementById('DataContrato').value;
            const corretor = document.getElementById('Corretor').value;
            const creci = document.getElementById('Creci').value;
            const cpf = document.getElementById('Cpf').value;
            const nomeLocador = document.getElementById('NomeLocador').value;
            const nomeLocatario = document.getElementById('NomeLocatario').value;
            const endereco = document.getElementById('Endereco').value;
            const estadoImovel = document.querySelector('input[name="estadoImovel"]:checked')?.value || 'Não informado';

            // Add Title
            doc.setFontSize(22);
            doc.text("LAUDO DE VISTORIA", doc.internal.pageSize.getWidth() / 2, 20, { align: "center" });

            let yOffset = 30;

            // Add form data
            doc.setFontSize(10);
            doc.text(`Data do Laudo: ${dataLaudo}`, 10, yOffset);
            doc.text(`Tipo de Imóvel: ${tipoImovel}`, 100, yOffset);
            yOffset += 7;
            doc.text(`Destinação: ${destinacao}`, 10, yOffset);
            doc.text(`Data do Contrato: ${dataContrato}`, 100, yOffset);
            yOffset += 7;
            doc.text(`Corretor(a): ${corretor}`, 10, yOffset);
            doc.text(`CRECI: ${creci}`, 100, yOffset);
            yOffset += 7;
            doc.text(`CPF: ${cpf}`, 10, yOffset);
            yOffset += 7;
            doc.text(`Locador: ${nomeLocador}`, 10, yOffset);
            doc.text(`Locatário: ${nomeLocatario}`, 100, yOffset);
            yOffset += 7;
            doc.text(`Endereço: ${endereco}`, 10, yOffset);
            yOffset += 7;
            doc.text(`Estado do Imóvel: ${estadoImovel}`, 10, yOffset);
            yOffset += 15; // Space before next section

            // Table for Itens de Vistoria
            doc.setFontSize(14);
            doc.text("Itens da Vistoria", doc.internal.pageSize.getWidth() / 2, yOffset, { align: "center" });
            yOffset += 10;

            // Define cell height for headers for calculation
            const headerCellHeight = 7;
            // Calculate vertical center for text in header cells
            const headerTextYOffset = yOffset + (headerCellHeight / 2) + (doc.internal.getFontSize() / (2 * doc.internal.scaleFactor));

            // Table headers
            doc.setFontSize(10);
            doc.rect(10, yOffset, 90, headerCellHeight); 
            doc.text("ITEM", 55, headerTextYOffset, { align: "center" }); // Vertically centered
            doc.rect(100, yOffset, 100, headerCellHeight); 
            doc.text("FOTO", 150, headerTextYOffset, { align: "center" }); // Vertically centered
            yOffset += headerCellHeight;

            itensVistoria.forEach(item => {
                const contentCellHeight = 35; // Height for row to accommodate 3cm image (approx)
                if (yOffset + contentCellHeight > doc.internal.pageSize.getHeight() - 10) { // Check for page break
                    doc.addPage();
                    yOffset = 20; // Reset yOffset for new page
                    // Re-draw headers on new page
                    doc.setFontSize(10);
                    const newPageHeaderTextYOffset = yOffset + (headerCellHeight / 2) + (doc.internal.getFontSize() / (2 * doc.internal.scaleFactor));
                    doc.rect(10, yOffset, 90, headerCellHeight); 
                    doc.text("ITEM", 55, newPageHeaderTextYOffset, { align: "center" });
                    doc.rect(100, yOffset, 100, headerCellHeight); 
                    doc.text("FOTO", 150, newPageHeaderTextYOffset, { align: "center" });
                    yOffset += headerCellHeight;
                }

                doc.rect(10, yOffset, 90, contentCellHeight);
                doc.text(item.text, 15, yOffset + 5, { maxWidth: 80 }); // Item text, currently top-aligned with padding
                doc.rect(100, yOffset, 100, contentCellHeight);
                if (item.photo) {
                    // Calculate image dimensions to fit 3cm height (approx 113.38 pixels at 96 DPI)
                    // jsPDF works with mm, so 3cm = 30mm
                    const imgWidth = 30 * (doc.getImageProperties(item.photo).width / doc.getImageProperties(item.photo).height);
                    doc.addImage(item.photo, 'JPEG', 105, yOffset + 2.5, imgWidth, 30); // x, y, width, height
                }
                yOffset += contentCellHeight;
            });

            yOffset += 15; // Space before next section

            // Title for Danos Encontrados
            doc.setFontSize(14);
            doc.text("Danos Encontrados.", doc.internal.pageSize.getWidth() / 2, yOffset, { align: "center" });
            yOffset += 10;


            // Table headers
            doc.setFontSize(10);
            const danoHeaderTextYOffset = yOffset + (headerCellHeight / 2) + (doc.internal.getFontSize() / (2 * doc.internal.scaleFactor));

            doc.rect(10, yOffset, 90, headerCellHeight); 
            doc.text("Item Danificado", 55, danoHeaderTextYOffset, { align: "center" }); // Vertically centered
            doc.rect(100, yOffset, 100, headerCellHeight); 
            doc.text("Foto", 150, danoHeaderTextYOffset, { align: "center" }); // Vertically centered
            yOffset += headerCellHeight;

            itensDanificados.forEach(item => {
                const contentCellHeight = 35; // Height for row to accommodate 3cm image (approx)
                if (yOffset + contentCellHeight > doc.internal.pageSize.getHeight() - 10) { // Check for page break
                    doc.addPage();
                    yOffset = 20; // Reset yOffset for new page
                    // Re-draw headers on new page
                    doc.setFontSize(10);
                    const newPageDanoHeaderTextYOffset = yOffset + (headerCellHeight / 2) + (doc.internal.getFontSize() / (2 * doc.internal.scaleFactor));
                    doc.rect(10, yOffset, 90, headerCellHeight); 
                    doc.text("Item Danificado", 55, newPageDanoHeaderTextYOffset, { align: "center" });
                    doc.rect(100, yOffset, 100, headerCellHeight); 
                    doc.text("Foto", 150, newPageDanoHeaderTextYOffset, { align: "center" });
                    yOffset += headerCellHeight;
                }

                doc.rect(10, yOffset, 90, contentCellHeight);
                doc.text(item.text, 15, yOffset + 5, { maxWidth: 80 }); // Item text
                doc.rect(100, yOffset, 100, contentCellHeight);
                if (item.photo) {
                    const imgWidth = 30 * (doc.getImageProperties(item.photo).width / doc.getImageProperties(item.photo).height);
                    doc.addImage(item.photo, 'JPEG', 105, yOffset + 2.5, imgWidth, 30); // x, y, width, height
                }
                yOffset += contentCellHeight;
            });

            // --- Adiciona a numeração de página ---
            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(10);
                doc.text(`Página ${i} de ${totalPages}`, doc.internal.pageSize.getWidth() - 30, doc.internal.pageSize.getHeight() - 10, { align: "right" });
            }
            // --- Fim da adição da numeração de página ---

            doc.save("laudo_de_vistoria.pdf");
        });
    </script>
</body>
</html>
